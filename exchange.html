<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOUCH — Exchange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A1610; --bg-2:#0E1D15; --panel:#13271C; --panel-2:#172E22; --elev:#16302455;
  --line:#234234; --line-soft:#1C3527;
  --paper:#ECEEE7; --muted:#90A89A; --faint:#5E7568;
  --emerald:#23A86E; --emerald-br:#3FD98C; --emerald-glow:rgba(63,217,140,.3); --emerald-tint:#16382680;
  --coral:#FF6B4A; --coral-glow:rgba(255,107,74,.35); --gold:#E2B45A; --blue:#5AA9E2;
  --display:'Bricolage Grotesque',sans-serif; --body:'Hanken Grotesk',sans-serif; --mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--paper);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(680px 480px at 12% -5%,var(--emerald-glow),transparent 60%),
  radial-gradient(600px 460px at 92% 8%,var(--coral-glow),transparent 60%)}
::selection{background:var(--coral);color:#0A1610}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
.app{position:relative;z-index:1}

/* ===== TOP BAR ===== */
.topbar{position:sticky;top:0;z-index:40;background:rgba(10,22,16,.78);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.tb-in{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:22px;padding:13px clamp(16px,3vw,32px)}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.02em}
.logo .mark{width:23px;height:23px;border-radius:7px;background:var(--paper);position:relative;display:grid;place-items:center}
.logo .mark::before{content:'';width:8px;height:8px;border-radius:50%;border:2.4px solid var(--coral);box-sizing:border-box}
.logo .mark::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;border:2.4px solid var(--emerald);transform:translateX(5px)}
.logo .tag{font-family:var(--mono);font-size:10px;color:var(--faint);border:1px solid var(--line);padding:2px 7px;border-radius:5px;letter-spacing:.08em;margin-left:2px}
.tabs{display:flex;gap:4px;margin-left:8px}
.tabs button{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:8px 14px;border-radius:9px;transition:.2s}
.tabs button:hover{color:var(--paper)}
.tabs button.on{background:var(--panel);color:var(--paper)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.tb-back{font-family:var(--mono);font-size:11px;color:var(--faint);text-decoration:none;transition:.15s;padding:6px 10px;border-radius:8px;border:1px solid var(--line)}
.tb-back:hover{color:var(--paper);border-color:var(--muted)}
.tb-signout{font-family:var(--mono);font-size:11px;color:var(--coral);background:rgba(255,107,74,.08);border:1px solid rgba(255,107,74,.25);border-radius:8px;padding:6px 12px;cursor:pointer;transition:.15s}
.tb-signout:hover{background:rgba(255,107,74,.15);border-color:var(--coral)}
.pricepill{font-family:var(--mono);font-size:12.5px;display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);padding:7px 12px;border-radius:9px}
.pricepill .sym{color:var(--gold);font-weight:700}.pricepill .val{font-weight:700}
.pricepill .chg.up{color:var(--emerald-br)}.pricepill .chg.down{color:var(--coral)}
.balpill{font-family:var(--mono);font-size:12.5px;background:var(--emerald-tint);border:1px solid rgba(63,217,140,.3);color:var(--emerald-br);padding:7px 12px;border-radius:9px;font-weight:700}
.me{width:34px;height:34px;border-radius:10px;background:var(--coral);display:grid;place-items:center;font-family:var(--display);font-weight:700;color:#fff;font-size:14px}
@media(max-width:780px){.logo .tag{display:none}.pricepill .chg{display:none}}
@media(max-width:600px){.tabs button{padding:8px 10px;font-size:13px}.balpill{display:none}}

/* ===== PAGE ===== */
.page{max-width:1240px;margin:0 auto;padding:clamp(20px,3vw,34px) clamp(16px,3vw,32px) 80px}
.page-title{font-family:var(--display);font-weight:700;font-size:clamp(24px,3vw,32px);letter-spacing:-.02em}
.page-sub{color:var(--muted);font-size:14.5px;margin-top:5px;margin-bottom:24px}

/* ===== RATES BOARD ===== */
.rates-board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.rate-card{background:linear-gradient(160deg,rgba(20,42,30,.92),rgba(10,22,16,.92));border:1px solid var(--line);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.75),0 0 40px -20px var(--emerald-glow),inset 0 1px 0 rgba(255,255,255,.04);backdrop-filter:blur(10px)}
.rate-ic{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:16px;flex-shrink:0}
.rate-name{font-family:var(--mono);font-size:10.5px;color:var(--faint);letter-spacing:.05em}
.rate-val{font-family:var(--display);font-weight:700;font-size:19px;margin-top:2px}
.rate-chg{font-family:var(--mono);font-size:11px;margin-top:3px}
.rate-chg.up{color:var(--emerald-br)}.rate-chg.down{color:var(--coral)}
@media(max-width:600px){.rates-board{grid-template-columns:1fr}}

/* ===== TRADE LAYOUT ===== */
.trade-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;max-width:860px}
@media(max-width:720px){.trade-layout{grid-template-columns:1fr}}

/* ===== TRADE CARD ===== */
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.tc{background:linear-gradient(165deg,rgba(20,40,29,.93),rgba(11,24,17,.93));border:1px solid var(--line);border-radius:22px;padding:26px;
  box-shadow:0 50px 100px -30px rgba(0,0,0,.85),0 0 70px -30px var(--emerald-glow),inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(14px);animation:bob 7s ease-in-out infinite;will-change:transform}
.tc-title{font-family:var(--display);font-weight:700;font-size:18px;margin-bottom:18px}

/* currency selector */
.cur-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding:9px 13px;background:var(--bg);border:1px solid var(--line);border-radius:10px}
.cur-label{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--faint)}
.cur-sel{background:var(--panel);border:1px solid var(--line);border-radius:7px;color:var(--paper);font-family:var(--body);font-size:13px;font-weight:600;padding:5px 10px;outline:none;cursor:pointer;transition:.15s}
.cur-sel:focus{border-color:var(--emerald-br)}
.cur-live{font-family:var(--mono);font-size:10px;color:var(--emerald-br);display:flex;align-items:center;gap:5px}
.cur-live .d{width:6px;height:6px;border-radius:50%;background:var(--emerald-br);animation:blink 2s infinite}

/* side toggle */
.side-tog{display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:4px;gap:3px;margin-bottom:20px;width:100%}
.side-tog button{flex:1;background:none;border:none;color:var(--muted);font-weight:700;font-size:15px;padding:10px;border-radius:8px;transition:.2s}
.side-tog button.on.buy{background:var(--emerald);color:#04130C}
.side-tog button.on.sell{background:var(--coral);color:#fff}

/* crypto pills */
.crypto-pills{display:flex;gap:8px;margin-bottom:20px}
.cpill{flex:1;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--muted);transition:.2s}
.cpill .sym{font-size:17px;display:block;margin-bottom:3px}
.cpill.on{border-color:var(--emerald-br);color:var(--paper);background:var(--emerald-tint)}

/* amount input */
.amt-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}
.amt-wrap{background:var(--bg);border:1.5px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:10px;transition:.2s;margin-bottom:8px}
.amt-wrap:focus-within{border-color:var(--emerald-br);box-shadow:0 0 0 3px var(--emerald-tint)}
.amt-wrap input{flex:1;background:none;border:none;color:var(--paper);font-family:var(--display);font-weight:700;font-size:26px;outline:none;width:100%;min-width:0}
.amt-wrap input::placeholder{color:var(--faint)}
.unit-tog{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px;flex-shrink:0}
.unit-tog button{background:none;border:none;color:var(--muted);font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 9px;border-radius:5px}
.unit-tog button.on{background:var(--emerald-tint);color:var(--emerald-br)}

/* conversion display */
.conv-row{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;margin-bottom:20px}
.conv-row .recv{font-family:var(--display);font-weight:700;font-size:18px;color:var(--emerald-br)}
.conv-row .rate{font-family:var(--mono);font-size:11px;color:var(--faint)}
.hint{font-size:12.5px;padding:10px 13px;border-radius:9px;margin-bottom:16px}
.hint.ok{background:var(--emerald-tint);color:var(--emerald-br)}
.hint.bad{background:rgba(255,107,74,.1);color:var(--coral)}

/* buttons */
.btn-main{width:100%;background:var(--emerald);color:#04130C;font-weight:700;font-size:15.5px;border:none;border-radius:12px;padding:14px;transition:.22s;display:flex;align-items:center;justify-content:center;gap:9px}
.btn-main:hover{background:var(--emerald-br);transform:translateY(-2px);box-shadow:0 12px 30px -10px var(--emerald-glow)}
.btn-main:disabled{opacity:.4;pointer-events:none}
.btn-main.sell{background:var(--coral);color:#fff}
.btn-main.sell:hover{filter:brightness(1.1);box-shadow:0 12px 30px -10px var(--coral-glow)}
.btn-ghost{width:100%;background:none;border:1px solid var(--line);color:var(--muted);font-weight:600;font-size:14px;border-radius:12px;padding:12px;margin-top:9px;transition:.2s}
.btn-ghost:hover{border-color:var(--coral);color:var(--coral)}

/* step 2: payment details */
.pay-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.countdown{font-family:var(--mono);font-size:13px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:7px 12px;display:flex;align-items:center;gap:7px}
.countdown .ct{font-weight:700;color:var(--paper)}
.countdown.warn .ct{color:var(--coral)}
.pay-summary{background:var(--bg);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:16px}
.ps-row{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--line-soft);font-size:13.5px}
.ps-row:last-child{border-bottom:none}
.ps-row .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.ps-row .v{font-weight:600;display:flex;align-items:center;gap:9px}
.copy-btn{font-family:var(--mono);font-size:10px;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:3px 8px;border-radius:5px;transition:.15s}
.copy-btn:hover{border-color:var(--emerald-br);color:var(--emerald-br)}
.pay-notice{background:rgba(226,180,90,.08);border:1px solid rgba(226,180,90,.2);border-radius:10px;padding:11px 14px;font-size:12.5px;color:var(--gold);margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;line-height:1.5}
/* wallet address input */
.wallet-field{margin-bottom:16px}
.wallet-field label{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:8px}
.wallet-input-wrap{position:relative}
.wallet-input-wrap input{width:100%;background:var(--bg);border:1.5px solid var(--line);border-radius:11px;padding:12px 42px 12px 14px;color:var(--paper);font-family:var(--mono);font-size:13px;outline:none;transition:.2s}
.wallet-input-wrap input:focus{border-color:var(--emerald-br);box-shadow:0 0 0 3px var(--emerald-tint)}
.wallet-input-wrap input.bad{border-color:var(--coral);box-shadow:0 0 0 3px rgba(255,107,74,.12)}
.wallet-input-wrap input::placeholder{color:var(--faint)}
.wallet-paste{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--muted);font-family:var(--mono);font-size:10px;padding:3px 8px;transition:.15s}
.wallet-paste:hover{border-color:var(--emerald-br);color:var(--emerald-br)}
.wallet-err{font-family:var(--mono);font-size:11px;color:var(--coral);margin-top:5px;display:none}
.wallet-err.show{display:block}

/* payout method (sell) */
.payout-field{margin-bottom:16px}
.payout-field label{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:8px}
.payout-tog{display:flex;gap:8px;margin-bottom:12px}
.payout-tog button{flex:1;background:var(--bg);border:1.5px solid var(--line);border-radius:9px;padding:10px 8px;font-family:var(--mono);font-size:12px;font-weight:700;color:var(--muted);transition:.2s;display:flex;flex-direction:column;align-items:center;gap:4px}
.payout-tog button .ic{font-size:18px}
.payout-tog button.on{border-color:var(--emerald-br);color:var(--emerald-br);background:var(--emerald-tint)}
.payout-inputs{display:flex;flex-direction:column;gap:10px}
.pf{display:flex;flex-direction:column;gap:6px}
.pf label{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.pf input,.pf select{background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--paper);font-family:var(--body);font-size:14px;outline:none;transition:.2s;-webkit-appearance:none;appearance:none}
.pf input:focus,.pf select:focus{border-color:var(--emerald-br);box-shadow:0 0 0 3px var(--emerald-tint)}
.pf input::placeholder{color:var(--faint)}
.payout-err{font-family:var(--mono);font-size:11px;color:var(--coral);margin-top:4px;display:none}
.payout-err.show{display:block}

/* proof upload */
.proof-box{border:1.5px dashed var(--line);border-radius:12px;padding:18px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:14px;position:relative}
.proof-box:hover{border-color:var(--emerald-br);background:var(--emerald-tint)}
.proof-box input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.proof-box .pi{font-size:26px;margin-bottom:6px}
.proof-box .pt{font-size:13px;font-weight:600;color:var(--muted)}.proof-box .ps{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:3px}
.proof-preview{border-radius:10px;overflow:hidden;margin-bottom:14px;position:relative;display:none}
.proof-preview img{width:100%;max-height:160px;object-fit:cover;display:block;border-radius:10px}
.proof-preview .pr-rm{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:6px;padding:4px 9px;font-size:11px;font-family:var(--mono);cursor:pointer}
.proof-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:8px}

/* step 3: processing / done */
.center-card{text-align:center;padding:12px 8px}
.spin-ring{width:52px;height:52px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--emerald-br);margin:0 auto 18px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.done-ring{width:62px;height:62px;border-radius:50%;background:var(--emerald);display:grid;place-items:center;margin:0 auto 18px;font-size:28px;color:#04130C;box-shadow:0 0 40px -8px var(--emerald-glow)}
.center-card h3{font-family:var(--display);font-weight:700;font-size:21px;margin-bottom:9px}
.center-card p{font-size:14px;color:var(--muted);line-height:1.6;max-width:300px;margin:0 auto 20px}
.got-amt{font-family:var(--display);font-weight:800;font-size:28px;color:var(--emerald-br);margin-bottom:4px}
.got-sub{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:20px}

/* step indicator */
.steps-bar{display:flex;gap:0;margin-bottom:24px}
.step-dot{flex:1;text-align:center;position:relative}
.step-dot::before{content:'';position:absolute;top:8px;left:-50%;width:100%;height:2px;background:var(--line);z-index:0}
.step-dot:first-child::before{display:none}
.step-dot .d{width:18px;height:18px;border-radius:50%;background:var(--line);margin:0 auto 6px;border:2.5px solid var(--panel);position:relative;z-index:1;transition:.3s}
.step-dot .l{font-family:var(--mono);font-size:10px;color:var(--faint);transition:.3s}
.step-dot.done .d{background:var(--emerald-br)}
.step-dot.done .l{color:var(--muted)}
.step-dot.active .d{background:var(--coral);box-shadow:0 0 0 4px var(--coral-glow)}
.step-dot.active .l{color:var(--paper);font-weight:700}

/* info panel */
.info-panel{background:linear-gradient(160deg,rgba(20,42,30,.92),rgba(10,22,16,.92));border:1px solid var(--line);border-radius:18px;padding:22px;
  box-shadow:0 40px 80px -30px rgba(0,0,0,.8),0 0 60px -30px var(--emerald-glow),inset 0 1px 0 rgba(255,255,255,.04);
  backdrop-filter:blur(12px);animation:bob 9s ease-in-out infinite;animation-delay:-3s;will-change:transform}
.info-panel h4{font-family:var(--display);font-weight:700;font-size:15px;margin-bottom:12px;color:var(--muted)}
.info-list{display:flex;flex-direction:column;gap:10px}
.il{display:flex;gap:11px;font-size:13.5px;line-height:1.5}
.il .ck{color:var(--emerald-br);font-weight:700;flex-shrink:0;margin-top:2px}
.info-sep{height:1px;background:var(--line);margin:14px 0}

/* ===== ORDERS ===== */
.orders{display:flex;flex-direction:column;gap:9px}
.order{display:grid;grid-template-columns:auto 1.4fr 1.2fr 1fr auto;gap:16px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:15px 20px;box-shadow:0 6px 22px -10px rgba(0,0,0,.45)}
.o-side{font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 11px;border-radius:7px}
.o-side.buy{background:var(--emerald-tint);color:var(--emerald-br)}
.o-side.sell{background:rgba(255,107,74,.15);color:var(--coral)}
.order .who{font-weight:600;font-size:14px}.order .when{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:2px}
.order .amt{font-family:var(--mono);font-size:14px}.order .amt .f{color:var(--faint);font-size:11px}
.order .pm{font-family:var(--mono);font-size:11px;color:var(--muted)}
.status{font-family:var(--mono);font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:6px}
.status .d{width:7px;height:7px;border-radius:50%}
.status.completed{color:var(--emerald-br)}.status.completed .d{background:var(--emerald-br)}
.status.open{color:var(--gold)}.status.open .d{background:var(--gold);animation:blink 1.4s infinite}
.status.cancelled{color:var(--faint)}.status.cancelled .d{background:var(--faint)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:820px){.order{grid-template-columns:auto 1fr auto}.order .pm,.order .amt{display:none}}

/* ===== WALLET ===== */
.wallet-top{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-end;margin-bottom:24px}
.wallet-total{background:linear-gradient(160deg,var(--panel-2),var(--panel));border:1px solid var(--line);border-radius:16px;padding:22px 26px;box-shadow:0 12px 40px -14px rgba(0,0,0,.6)}
.wallet-total .l{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
.wallet-total .v{font-family:var(--display);font-weight:800;font-size:36px;letter-spacing:-.02em;margin-top:6px}
.assets{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.asset{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 6px 22px -8px rgba(0,0,0,.45);transition:.22s}
.asset:hover{transform:translateY(-2px);box-shadow:0 14px 36px -10px rgba(0,0,0,.55)}
.asset .ic{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:18px}
.asset .nm{font-weight:600}.asset .sym{font-family:var(--mono);font-size:11px;color:var(--faint)}
.asset .amt{margin-left:auto;text-align:right}
.asset .amt .a{font-family:var(--mono);font-weight:700;font-size:15px}
.asset .amt .f{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:2px}

/* empty */
.empty{text-align:center;padding:50px;color:var(--faint);font-family:var(--mono);font-size:13px}

/* toast */
.toasts{position:fixed;bottom:22px;right:22px;z-index:120;display:flex;flex-direction:column;gap:9px;align-items:flex-end}
.toast{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:12px 18px;font-size:13.5px;font-weight:600;box-shadow:0 20px 40px -16px rgba(0,0,0,.7);display:flex;align-items:center;gap:10px;animation:tin .3s}
.toast .d{width:8px;height:8px;border-radius:50%;background:var(--emerald-br)}
.toast.warn .d{background:var(--coral)}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

/* ===== CHAT WIDGET ===== */
.chat-fab{position:fixed;bottom:24px;right:24px;z-index:100;width:54px;height:54px;border-radius:50%;background:var(--emerald);border:none;color:#04130C;display:grid;place-items:center;box-shadow:0 8px 28px -8px var(--emerald-glow),0 4px 14px rgba(0,0,0,.45);transition:.22s}
.chat-fab:hover{background:var(--emerald-br);transform:scale(1.07)}
.chat-fab .ubadge{position:absolute;top:-3px;right:-3px;width:18px;height:18px;border-radius:50%;background:var(--coral);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;display:none;align-items:center;justify-content:center;border:2px solid var(--bg)}
.chat-fab .ubadge.show{display:flex}
.chat-panel{position:fixed;bottom:88px;right:24px;z-index:99;width:320px;background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 24px 64px -20px rgba(0,0,0,.85);display:none;flex-direction:column;animation:cpIn .22s ease}
.chat-panel.open{display:flex}
@keyframes cpIn{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.cp-head{padding:13px 16px;background:var(--panel-2);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
.cp-av{width:34px;height:34px;border-radius:10px;background:var(--emerald);display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:15px;color:#04130C;flex-shrink:0}
.cp-nm{font-weight:700;font-size:14px}
.cp-st{font-family:var(--mono);font-size:10px;color:var(--emerald-br);display:flex;align-items:center;gap:5px;margin-top:2px}
.cp-st::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--emerald-br);flex-shrink:0}
.cp-close{margin-left:auto;background:none;border:none;color:var(--faint);font-size:22px;line-height:1;padding:2px 6px;transition:.15s}
.cp-close:hover{color:var(--paper)}
.cp-body{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;min-height:240px;max-height:300px}
.cm{max-width:85%;padding:9px 13px;border-radius:13px;font-size:13.5px;line-height:1.45;word-break:break-word}
.cm.cust{background:var(--emerald);color:#04130C;align-self:flex-end;border-bottom-right-radius:4px;font-weight:500}
.cm.supp{background:var(--panel-2);border:1px solid var(--line);color:var(--paper);align-self:flex-start;border-bottom-left-radius:4px}
.cm .ct{font-family:var(--mono);font-size:9px;opacity:.6;margin-top:3px;display:block}
.cm.sys-m{align-self:center;background:transparent;color:var(--faint);font-family:var(--mono);font-size:10.5px;padding:3px 0;text-align:center;max-width:100%;border-radius:0}
.cp-input{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
.cp-input input{flex:1;background:var(--bg);border:1.5px solid var(--line);border-radius:9px;padding:9px 12px;color:var(--paper);font-family:var(--body);font-size:13.5px;outline:none;transition:.2s}
.cp-input input:focus{border-color:var(--emerald-br)}
.cp-send{width:36px;height:36px;border-radius:9px;background:var(--emerald);border:none;color:#04130C;display:grid;place-items:center;flex-shrink:0;transition:.2s}
.cp-send:hover{background:var(--emerald-br)}
@media(max-width:520px){.chat-panel{right:12px;left:12px;width:auto;bottom:80px}}

@media(max-width:520px){

}

<script>
"use strict";
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const $=s=>document.querySelector(s);

/* ===== EMAIL NOTIFICATIONS ===== */
const EMAILJS_PUBLIC_KEY  = 'UDgd2YcVwRDxziFlo';
const EMAILJS_SERVICE_ID  = 'service_l0mj3tq';
const EMAILJS_TEMPLATE_ID = 'template_7d8vywc';
if(typeof emailjs!=='undefined' && EMAILJS_PUBLIC_KEY!=='YOUR_PUBLIC_KEY'){
  emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });

function notifyAdmin(order){
  if(typeof emailjs==='undefined'||EMAILJS_PUBLIC_KEY==='YOUR_PUBLIC_KEY')return;
  const fc=FIAT_CURRENCIES[order.fiatCurrency]||{sym:'$',name:'USD'};

  const params={

    order_side:  side,
    crypto:      order.crypto,
    crypto_amt:  (order.cryptoAmt||0).toFixed(6)+' '+order.crypto,
    fiat_amt:    localAmt+' ('+( (order.fiatAmt||0).toFixed(2) )+' USD)',
    username:    order.username||'Anonymous',
    time:        time,
  };
  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params).catch(()=>{});
}

/* ===== ADMIN CONFIG (rates + payment details) ===== */
const CONFIG = {
  rates: { BTC:67200, ETH:2418, USDT:1.0, SOL:148 },
  buyDetails: {                          // user pays fiat → platform
    bank:    '',
    name:    '',
    account: '',
  },
  momoDetails: { network:'', number:'', name:'' },
  sellWallets: {                         // user sends crypto/asset → platform
    SOL:  '',
    BTC:  'bc1qxy2kgdygjrsqtzq2n0yrf2493p83kkfjhx0wlh',
    ETH:  '0x742d35Cc6634C0532925a3b8D4C2F5A0b91A7854',
    USDT: '0x742d35Cc6634C0532925a3b8D4C2F5A0b91A7854',
  },
  paymentWindow: 15,                     // minutes
};
/* load admin-configured wallet/payment details */
const SUPABASE_URL  = 'https://khayyeitwpblqaffvdvm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtoYXl5ZWl0d3BibHFhZmZ2ZHZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NDczMTcsImV4cCI6MjA5NzIyMzMxN30.eHtG7BxPGYrAiFEdymNNG6cu1GgtVj0SuJZ9RoMl9wU';
const sb = (typeof supabase !== 'undefined') ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON) : null;

function applyConfig(cfg){
  if(!cfg)return;
  if(cfg.sellWallets)Object.assign(CONFIG.sellWallets,cfg.sellWallets);
  if(cfg.buyDetails)Object.assign(CONFIG.buyDetails,cfg.buyDetails);
  if(cfg.rates)Object.assign(CONFIG.rates,cfg.rates);
  if(cfg.paymentWindow)CONFIG.paymentWindow=parseInt(cfg.paymentWindow)||15;
  if(cfg.momoDetails)CONFIG.momoDetails=cfg.momoDetails;
}
// apply cached config immediately so page renders fast
applyConfig(JSON.parse(localStorage.getItem('vouch_config')||'{}'));
// fetch latest from Supabase — store promise so step 2 can await it
let configReady=Promise.resolve();
if(sb){
  configReady=(async function(){
    try{
      const {data}=await sb.from('site_config').select('data').eq('id',1).maybeSingle();
      if(data?.data){
        localStorage.setItem('vouch_config',JSON.stringify(data.data));
        applyConfig(data.data);
        if(S.step===0)renderStep1();
      }
    }catch(e){}
  })();
}

/* ===== CRYPTOS ===== */
const CRYPTOS = {
  BTC:  { name:'Bitcoin',  glyph:'₿', color:'#E2B45A', bg:'radial-gradient(circle at 35% 30%,#3a2a12,#1a1207)', dec:6 },
  ETH:  { name:'Ethereum', glyph:'Ξ', color:'#5AA9E2', bg:'radial-gradient(circle at 35% 30%,#16283a,#0a121d)', dec:4 },
  USDT: { name:'Tether',   glyph:'₮', color:'#3FD98C', bg:'radial-gradient(circle at 35% 30%,#16382a,#0a1d15)', dec:2 },
  SOL:  { name:'Solana',   glyph:'◎',  color:'#9945FF', bg:'radial-gradient(circle at 35% 30%,#2a1040,#150820)', dec:4 },
};

/* ===== AFRICAN FIAT CURRENCIES ===== */
const FIAT_CURRENCIES = {
  GHS:{ name:'Ghanaian Cedi',      sym:'₵',   flag:'🇬🇭' },
  NGN:{ name:'Nigerian Naira',     sym:'₦',   flag:'🇳🇬' },
  KES:{ name:'Kenyan Shilling',    sym:'KSh', flag:'🇰🇪' },
  ZAR:{ name:'South African Rand', sym:'R',   flag:'🇿🇦' },
  UGX:{ name:'Ugandan Shilling',   sym:'USh', flag:'🇺🇬' },
  TZS:{ name:'Tanzanian Shilling', sym:'TSh', flag:'🇹🇿' },
  XOF:{ name:'West African CFA',   sym:'CFA', flag:'🌍' },
  MAD:{ name:'Moroccan Dirham',    sym:'DH',  flag:'🇲🇦' },
  EGP:{ name:'Egyptian Pound',     sym:'E£',  flag:'🇪🇬' },
  ETB:{ name:'Ethiopian Birr',     sym:'Br',  flag:'🇪🇹' },
  ZMW:{ name:'Zambian Kwacha',     sym:'K',   flag:'🇿🇲' },
  RWF:{ name:'Rwandan Franc',      sym:'RF',  flag:'🇷🇼' },
};
/* fallback rates vs USD (used if API is unavailable) */
const FALLBACK_RATES = { GHS:15.3,NGN:1580,KES:130,ZAR:18.5,UGX:3750,TZS:2680,XOF:615,MAD:10.1,EGP:48.5,ETB:56.8,ZMW:25.2,RWF:1320 };

/* ===== STATE ===== */
const S = {
  tab:'trade', side:'buy', crypto:'BTC', unit:'fiat', amount:0, step:0,
  timerSec:0, timerInt:null, pollInt:null, tradeRef:null, cryptoAmt:0, fiatAmt:0, proofData:null,
  fiatCurrency: localStorage.getItem('vouch_fiatCurrency')||'GHS',
  fiatRate: FALLBACK_RATES[localStorage.getItem('vouch_fiatCurrency')||'GHS']||15.3,
  fiatRates: {...FALLBACK_RATES},
  prices:{ BTC:67200, ETH:2418, USDT:1.0, SOL:148 },
  prev:{ BTC:67200, ETH:2418, USDT:1.0, SOL:148 },
  orders:[],
};

/* ===== HELPERS ===== */
const fmt$  = n => '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmt$0 = n => '$'+Math.round(n).toLocaleString('en-US');
const fmtC  = (n,c) => n.toLocaleString('en-US',{maximumFractionDigits:CRYPTOS[c].dec});
function fmtLocal(usdAmt){
  const fc=FIAT_CURRENCIES[S.fiatCurrency]; if(!fc)return fmt$(usdAmt);
  const local=usdAmt*S.fiatRate;
  const dec=local>=100?0:2;
  return fc.sym+local.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function localRate(){ return S.prices[S.crypto]*S.fiatRate; }

/* ===== LIVE RATES FETCH ===== */
async function fetchRates(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD');
    const d=await r.json();
    if(d.result==='success'){
      S.fiatRates=d.rates;
      S.fiatRate=d.rates[S.fiatCurrency]||FALLBACK_RATES[S.fiatCurrency]||1;
      syncAmt();
    }
  }catch(e){ /* keep fallback rates */ }
}
function toast(msg,warn){
  const t=document.createElement('div'); t.className='toast'+(warn?' warn':'');
  t.innerHTML='<span class="d"></span>'+msg; $('#toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2600);
}
function now(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }
function genRef(){ return 'VCH-'+Math.floor(8000+Math.random()*9000); }

/* ===== TOPBAR ===== */
function renderTopbar(){}

/* ===== TABS ===== */
$('#tabs').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  S.tab=b.dataset.tab;
  location.hash=S.tab;
  [...$('#tabs').children].forEach(x=>x.classList.toggle('on',x===b));
  render();
});

/* ===== ROUTER ===== */
function render(){
  if(S.tab==='trade') renderTrade();
  else if(S.tab==='orders') renderOrders();
}


/* ===== STEP INDICATOR ===== */
function stepsHTML(active){
  const labels=['Amount','Payment','Done'];
  return '<div class="steps-bar">'+labels.map((l,i)=>`<div class="step-dot ${i<active?'done':''} ${i===active?'active':''}"><div class="d"></div><div class="l">${l}</div></div>`).join('')+'</div>';
}

/* ===== TRADE TAB ===== */
function renderTrade(){
  clearInterval(S.pollInt); S.pollInt=null;
  S.step=0;
  const page=$('#page');
  page.innerHTML=`
    <div class="page-title">Trade</div>
    <div class="page-sub">Buy or sell crypto instantly at platform rates.</div>
    <div class="trade-layout">
      <div id="tradeCard"></div>
      <div class="info-panel">
        <h4>HOW IT WORKS</h4>
        <div class="info-list">
          <div class="il"><span class="ck">01</span><span>Choose an asset, select <b>Buy</b> or <b>Sell</b>, and enter your amount.</span></div>
          <div class="il"><span class="ck">02</span><span><b>Buying?</b> Provide your wallet address or account details to receive the asset.</span></div>
          <div class="il"><span class="ck">03</span><span><b>Selling?</b> Send your asset to our address and enter your payout details.</span></div>
          <div class="il"><span class="ck">04</span><span>Upload proof of payment. Our team confirms and releases your funds — typically within minutes.</span></div>
        </div>
        <div class="info-sep"></div>
        <h4>GOOD TO KNOW</h4>
        <div class="info-list">
          <div class="il"><span class="ck">—</span><span>Rates are set by Vouch and updated regularly.</span></div>
          <div class="il"><span class="ck">—</span><span>The rate at confirmation is the rate you get — no surprises.</span></div>
          <div class="il"><span class="ck">—</span><span>All trades are reviewed by our team before release.</span></div>
        </div>
      </div>
    </div>`;
  renderStep1();
}

/* ===== STEP 1: Amount ===== */
function renderStep1(){
  S.step=0;
  const rate = S.prices[S.crypto];
  // S.amount is stored as USD; cryptoAmt and fiatUsd derived from it
  const cryptoAmt = S.amount/rate;
  const fiatUsd   = S.amount;
  const localFiatAmt = fiatUsd * S.fiatRate;
  // display value for the input field: local currency when unit=fiat, crypto otherwise
  const inputVal = S.unit==='fiat' ? Math.round(localFiatAmt) : fmtC(cryptoAmt,S.crypto);

  $('#tradeCard').innerHTML=`
    <div class="tc">
      ${stepsHTML(0)}
      <div class="cur-row">
        <span class="cur-label">Fiat currency</span>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="cur-live"><span class="d"></span>Live rates</span>
          <select id="fiatSel" class="cur-sel">
            ${Object.entries(FIAT_CURRENCIES).map(([k,v])=>`<option value="${k}" ${S.fiatCurrency===k?'selected':''}>${v.flag} ${k} — ${v.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="tc-title">What would you like to do?</div>
      <div class="side-tog" id="sideTog">
        <button data-s="buy"  class="${S.side==='buy' ?'on buy' :''}">Buy crypto</button>
        <button data-s="sell" class="${S.side==='sell'?'on sell':''}">Sell crypto</button>
      </div>
      <div class="crypto-pills" id="cryptoPills">
        ${Object.entries(CRYPTOS).map(([k,c])=>`
          <div class="cpill ${S.crypto===k?'on':''}" data-c="${k}" style="${S.crypto===k?'border-color:'+c.color+';color:'+c.color:''}">
            <span class="sym">${c.glyph}</span>${k}
          </div>`).join('')}
      </div>
      <div class="amt-label">You ${S.side==='buy'?'pay':'send'}</div>
      <div class="amt-wrap"><input id="amtIn" type="text" inputmode="decimal" placeholder="0" value="${inputVal}">
        <div class="unit-tog" id="unitTog">
          <button data-u="fiat"   class="${S.unit==='fiat'  ?'on':''}">${S.fiatCurrency}</button>
          <button data-u="crypto" class="${S.unit==='crypto'?'on':''}">${S.crypto}</button>
        </div>
      </div>
      <div class="conv-row">
        <div><div style="font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:3px">You ${S.side==='buy'?'receive':'get'}</div>
          <div class="recv" id="recvVal">${S.side==='buy'?fmtC(cryptoAmt,S.crypto)+' '+S.crypto:fmtLocal(fiatUsd)}</div></div>
        <div class="rate" id="rateLabel">@ ${fmtLocal(rate)} / ${S.crypto}</div>
      </div>
      <div class="hint ok" id="hint">Rate locked when you confirm.</div>
      <button class="btn-main ${S.side}" id="continueBtn">Continue <span style="margin-left:4px">→</span></button>
    </div>`;

  /* events */
  document.getElementById('sideTog').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b)return;
    S.side=b.dataset.s; renderStep1();
  });
  document.getElementById('cryptoPills').addEventListener('click',e=>{
    const p=e.target.closest('.cpill'); if(!p)return;
    S.crypto=p.dataset.c; renderTopbar(); renderStep1();
  });
  document.getElementById('unitTog').addEventListener('click',e=>{
    const b=e.target.closest('button'); if(!b)return;
    const r=S.prices[S.crypto];
    const cur=parseFloat(document.getElementById('amtIn').value)||0;
    // S.amount is always stored in USD
    if(S.unit==='fiat')   S.amount=cur/S.fiatRate;   // local → USD
    else                  S.amount=cur*r;              // crypto → USD
    S.unit=b.dataset.u; renderStep1();
  });
  document.getElementById('fiatSel').addEventListener('change',e=>{
    S.fiatCurrency=e.target.value;
    S.fiatRate=S.fiatRates[S.fiatCurrency]||FALLBACK_RATES[S.fiatCurrency]||1;
    localStorage.setItem('vouch_fiatCurrency',S.fiatCurrency);
    renderStep1();
  });
  const inp=document.getElementById('amtIn');
  inp.addEventListener('input',syncAmt); inp.select();
  document.getElementById('continueBtn').addEventListener('click',goToStep2);
  syncAmt();
}

function syncAmt(){
  const inp=document.getElementById('amtIn'); if(!inp)return;
  const v=parseFloat(inp.value.replace(/,/g,''))||0;
  // store S.amount as USD always
  S.amount=S.unit==='fiat'?v/S.fiatRate:v*S.prices[S.crypto];
  const rate=S.prices[S.crypto];
  // when unit==='fiat', v is in local currency; convert to USD for threshold check
  const usdAmt   =S.unit==='fiat'?v/S.fiatRate:v*rate;
  const cryptoAmt=S.unit==='fiat'?v/(rate*S.fiatRate):v;
  const fiatUsd  =S.unit==='fiat'?v/S.fiatRate:v*rate;
  const recvEl=document.getElementById('recvVal'); if(!recvEl)return;
  recvEl.textContent=S.side==='buy'?fmtC(cryptoAmt,S.crypto)+' '+S.crypto:fmtLocal(fiatUsd);
  const btn=document.getElementById('continueBtn');
  const ok=usdAmt>=10;
  if(btn)btn.disabled=!ok;
  const h=document.getElementById('hint');
  if(h){h.className='hint '+(ok?'ok':'bad');h.textContent=ok?'Rate locked when you confirm.':`Enter at least ${fmtLocal(10)} to continue.`;}
}

async function goToStep2(){
  // S.amount is always USD (set by syncAmt)
  const rate=S.prices[S.crypto];
  S.fiatAmt  =S.amount;
  S.cryptoAmt=S.amount/rate;
  S.tradeRef=genRef();
  await configReady; // ensure Supabase config is loaded before showing payment details
  S.timerSec=CONFIG.paymentWindow*60;
  renderStep2();
}

              <div class="ps-row"><span class="k">Bank</span><span class="v">${details.bank}</span></div>

            <button data-m="bank" class="${S.payoutMethod==='bank'?'on':''}"><span class="ic">🏦</span>Bank Account</button>

  }));

    btn.disabled=!proofOk; btn.style.opacity=proofOk?'1':'.4';

  /* attach proof + paidBtn listeners (called after phase2 revealed) */
  function attachPhase2(){

    const copyAmt=(S.fiatAmt*S.fiatRate).toFixed(2);
    const bd=CONFIG.buyDetails; const mm=CONFIG.momoDetails||{};
    const nets={mtn:'MTN Mobile Money',vodafone:'Vodafone Cash',airteltigo:'AirtelTigo Money'};
    const bankDiv=document.getElementById('buyBankDetails');
    if(bankDiv) bankDiv.innerHTML=`
      <div class="ps-row"><span class="k">Amount</span><span class="v">${localAmt} <button class="copy-btn" data-c="${copyAmt}">copy</button></span></div>
      <div class="ps-row"><span class="k">Bank</span><span class="v">${bd.bank||'—'}</span></div>

      <div class="ps-row"><span class="k">Amount</span><span class="v">${localAmt} <button class="copy-btn" data-c="${copyAmt}">copy</button></span></div>
      <div class="ps-row"><span class="k">Network</span><span class="v">${nets[mm.network]||mm.network||'—'}</span></div>
      <div class="ps-row"><span class="k">MoMo number</span><span class="v">${mm.number||'—'} <button class="copy-btn" data-c="${mm.number||''}">copy</button></span></div>
      <div class="ps-row"><span class="k">Account name</span><span class="v">${mm.name||'—'}</span></div>`;

    document.querySelectorAll('.copy-btn').forEach(b=>b.addEventListener('click',()=>{
      navigator.clipboard&&navigator.clipboard.writeText(b.dataset.c).catch(()=>{});
      b.textContent='copied ✓'; setTimeout(()=>b.textContent='copy',1400);
    }));
    const buyPayTog=document.getElementById('buyPayTog');
    if(buyPayTog){
      buyPayTog.addEventListener('click',e=>{
        const b=e.target.closest('button'); if(!b)return;
        [...buyPayTog.children].forEach(x=>x.classList.toggle('on',x===b));
        const isMomo=b.dataset.m==='momo';
        document.getElementById('buyBankDetails').style.display=isMomo?'none':'';
        document.getElementById('buyMomoDetails').style.display=isMomo?'':'none';
        S.buyPayMethod=b.dataset.m;
      });
    }
    document.getElementById('proofFile').addEventListener('change',function(){
      const file=this.files[0]; if(!file)return;
      const reader=new FileReader();
      reader.onload=e=>{
        S.proofData=e.target.result;
        document.getElementById('proofImg').src=e.target.result;
        document.getElementById('proofPreview').style.display='block';
        document.getElementById('proofBox').style.display='none';
        proofOk=true; checkReady();
      };
      reader.readAsDataURL(file);
    });
    document.getElementById('proofRm').addEventListener('click',()=>{
      S.proofData=null;
      document.getElementById('proofFile').value='';
      document.getElementById('proofPreview').style.display='none';
      document.getElementById('proofBox').style.display='block';
      proofOk=false; checkReady();
    });
    document.getElementById('paidBtn').addEventListener('click',goToStep3);
  }

  /* helper: lock done button to confirmed state */
  function lockDoneBtn(label){
    const b=document.getElementById('doneBtn'); if(!b)return;
    b.textContent=label;
    b.style.cssText='width:100%;background:var(--panel);color:var(--emerald-br);border:1.5px solid var(--emerald-br);font-weight:700;font-size:15.5px;border-radius:12px;padding:14px;cursor:default;display:flex;align-items:center;justify-content:center;gap:9px;margin-bottom:24px;opacity:1;pointer-events:none';
  }

  /* helper: reveal phase 2 + notify admin */
  function revealPhase2(adminEntry){
    const ao=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
    const idx=ao.findIndex(x=>x.id===S.tradeRef);
    if(idx>=0)ao[idx]=adminEntry; else ao.unshift(adminEntry);
    localStorage.setItem('vouch_orders',JSON.stringify(ao));
    if(BC)BC.postMessage({type:'order',order:adminEntry});
    notifyAdmin(adminEntry);
    const p2=document.getElementById('phase2');
    p2.style.display='';
    attachPhase2();
    checkReady();
    setTimeout(()=>p2.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }

  if(isBuy){
    /* BUY: wallet address → Done → bank details */
    const wIn=document.getElementById('destWallet');
    const wErr=document.getElementById('walletErr');
    const doneBtn=document.getElementById('doneBtn');
    function validateWallet(){
      const v=wIn.value.trim(); S.destWallet=v;
      const ok=v.length>=20;
      wIn.classList.toggle('bad',!ok&&v.length>0);
      wErr.classList.toggle('show',!ok&&v.length>0);
      doneBtn.disabled=!ok; doneBtn.style.opacity=ok?'1':'.4';
      doneBtn.textContent=ok?'Confirm my wallet address →':'Enter your wallet address first';
    }
    wIn.addEventListener('input',validateWallet);
    document.getElementById('pasteWallet').addEventListener('click',()=>{
      navigator.clipboard&&navigator.clipboard.readText().then(t=>{wIn.value=t.trim();validateWallet();}).catch(()=>{});
    });
    if(S.destWallet){wIn.value=S.destWallet;validateWallet();}
    doneBtn.addEventListener('click',()=>{
      S.destWallet=wIn.value.trim();
      lockDoneBtn('✓ Wallet confirmed — now pay below');
      revealPhase2({id:S.tradeRef,side:'buy',crypto:S.crypto,cryptoAmt:S.cryptoAmt,fiatAmt:S.fiatAmt,fiatCurrency:S.fiatCurrency,fiatRate:S.fiatRate,ts:Date.now(),status:'pending',walletAddr:S.destWallet,buyPayMethod:S.buyPayMethod||'bank',username:getChatUsername()});
    });
  } else {
    /* SELL: payout details → Done → platform wallet */
    S.payoutMethod=S.payoutMethod||'momo';
    const doneBtn=document.getElementById('doneBtn');
    let payoutOk=false;
    function momoHTML(){
      return `<div class="pf"><label>Network</label>
        <select id="momoNet"><option value="mtn" ${S.momoNet==='mtn'?'selected':''}>MTN Mobile Money</option><option value="vodafone" ${S.momoNet==='vodafone'?'selected':''}>Vodafone Cash</option><option value="airteltigo" ${S.momoNet==='airteltigo'?'selected':''}>AirtelTigo Money</option></select></div>
        <div class="pf"><label>MoMo number</label><input id="momoNum" type="tel" placeholder="024 000 0000" value="${S.momoNum||''}"></div>
        <div class="pf"><label>Account name</label><input id="momoName" type="text" placeholder="Full name on account" value="${S.momoName||''}"></div>`;
    }
    function bankHTML(){
      return `<div class="pf"><label>Bank name</label><input id="bankName" type="text" placeholder="e.g. GCB, Absa, Ecobank" value="${S.bankName||''}"></div>
        <div class="pf"><label>Account number</label><input id="bankAcc" type="text" placeholder="0000000000" value="${S.bankAcc||''}"></div>
        <div class="pf"><label>Account holder name</label><input id="bankHolder" type="text" placeholder="Full name on account" value="${S.bankHolder||''}"></div>`;
    }
    function validatePayout(){
      let ok=false;
      if(S.payoutMethod==='momo'){
        const num=(document.getElementById('momoNum')||{}).value||'';
        const nm=(document.getElementById('momoName')||{}).value||'';
        S.momoNet=(document.getElementById('momoNet')||{}).value||'mtn';
        S.momoNum=num; S.momoName=nm;
        ok=num.replace(/\s/g,'').length>=9&&nm.trim().length>=2;
      } else {
        const bn=(document.getElementById('bankName')||{}).value||'';
        const ba=(document.getElementById('bankAcc')||{}).value||'';
        const bh=(document.getElementById('bankHolder')||{}).value||'';
        S.bankName=bn; S.bankAcc=ba; S.bankHolder=bh;
        ok=bn.trim().length>=2&&ba.replace(/\s/g,'').length>=6&&bh.trim().length>=2;
      }
      const err=document.getElementById('payoutErr');
      if(err)err.classList.toggle('show',payoutOk&&!ok);
      payoutOk=ok;
      doneBtn.disabled=!ok; doneBtn.style.opacity=ok?'1':'.4';
      doneBtn.textContent=ok?'Confirm payout details →':'Fill payout details to continue';
    }
    function attachPayoutListeners(){
      ['momoNum','momoName','bankName','bankAcc','bankHolder'].forEach(id=>{
        const el=document.getElementById(id); if(el)el.addEventListener('input',validatePayout);
      });
      const sel=document.getElementById('momoNet'); if(sel)sel.addEventListener('change',validatePayout);
      validatePayout();
    }
    function renderPayoutInputs(){
      const wrap=document.getElementById('payoutInputs'); if(!wrap)return;
      wrap.innerHTML=S.payoutMethod==='momo'?momoHTML():bankHTML();
      attachPayoutListeners();
    }
    document.getElementById('payoutTog').addEventListener('click',e=>{
      const b=e.target.closest('button'); if(!b)return;
      S.payoutMethod=b.dataset.m;
      [...document.getElementById('payoutTog').children].forEach(x=>x.classList.toggle('on',x===b));
      renderPayoutInputs();
    });
    renderPayoutInputs();
    doneBtn.addEventListener('click',()=>{
      if(!payoutOk)return;
      const payoutDetails=S.payoutMethod==='momo'
        ?{type:'momo',network:S.momoNet,number:S.momoNum,name:S.momoName}
        :{type:'bank',bankName:S.bankName,account:S.bankAcc,holder:S.bankHolder};
      lockDoneBtn('✓ Payout details confirmed — now send your crypto');
      revealPhase2({id:S.tradeRef,side:'sell',crypto:S.crypto,cryptoAmt:S.cryptoAmt,fiatAmt:S.fiatAmt,fiatCurrency:S.fiatCurrency,fiatRate:S.fiatRate,ts:Date.now(),status:'pending',payoutMethod:S.payoutMethod,payoutDetails,username:getChatUsername()});
    });
  }

  /* countdown */
  function tickTimer(){
    const el=document.getElementById('ctVal'); if(!el){clearInterval(S.timerInt);return;}
    const m=Math.floor(S.timerSec/60), s=S.timerSec%60;
    el.textContent=m+':'+s.toString().padStart(2,'0');
    const cd=document.getElementById('countdown');
    if(S.timerSec<120&&cd)cd.classList.add('warn');
    if(S.timerSec<=0){clearInterval(S.timerInt);toast('Payment window expired',true);renderTrade();}
    S.timerSec--;
  }
  clearInterval(S.timerInt);
  tickTimer();
  if(!reduce)S.timerInt=setInterval(tickTimer,1000);
}

/* ===== STEP 3: Processing → Done ===== */
function goToStep3(){
  clearInterval(S.timerInt); S.timerInt=null;
  S.step=2;
  $('#tradeCard').innerHTML=`
    <div class="tc">
      ${stepsHTML(2)}
      <div class="center-card">
        <h3>Payment received</h3>
        <p>Wait a few minutes while we process your order.</p>
        <div style="font-family:var(--mono);font-size:12px;color:var(--faint)">Ref: ${S.tradeRef}</div>
      </div>
    </div>`;

  /* save proof to order and push to Supabase */
  const _ao=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
  const _idx=_ao.findIndex(x=>x.id===S.tradeRef);
  if(_idx>=0){
    _ao[_idx].proof=S.proofData||null;
    localStorage.setItem('vouch_orders',JSON.stringify(_ao));
    if(sb)sb.from('orders').upsert({id:S.tradeRef,data:_ao[_idx]}).catch(()=>{});
    if(BC)BC.postMessage({type:'order',order:_ao[_idx]});
  } else {
    const _e={id:S.tradeRef,side:S.side,crypto:S.crypto,cryptoAmt:S.cryptoAmt,fiatAmt:S.fiatAmt,ts:Date.now(),status:'pending',proof:S.proofData||null,username:getChatUsername()};
    if(S.side==='sell'){
      _e.payoutMethod=S.payoutMethod;
      _e.payoutDetails=S.payoutMethod==='momo'
        ?{type:'momo',network:S.momoNet,number:S.momoNum,name:S.momoName}
        :{type:'bank',bankName:S.bankName,account:S.bankAcc,holder:S.bankHolder};
    }else{_e.walletAddr=S.destWallet;}
    _ao.unshift(_e);localStorage.setItem('vouch_orders',JSON.stringify(_ao));
    if(sb)sb.from('orders').upsert({id:S.tradeRef,data:_e}).catch(()=>{});
    if(BC)BC.postMessage({type:'order',order:_e});
  }
  renderTopbar();

  /* poll every 3s — check localStorage (same browser) and Supabase (cross-device) */
  const _ref=S.tradeRef;
  S.pollInt=setInterval(async()=>{
    if(S.step!==2){clearInterval(S.pollInt);S.pollInt=null;return;}
    /* localStorage check — works when admin is on same browser */
    try{
      const _lo=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
      const _lo_order=_lo.find(x=>x.id===_ref);
      if(_lo_order&&_lo_order.status==='approved'){
        clearInterval(S.pollInt);S.pollInt=null;showDone();return;
      }
    }catch(e){}
    /* Supabase check — works cross-device */
    if(sb){
      try{
        const {data}=await sb.from('orders').select('data').eq('id',_ref).maybeSingle();
        if(data?.data?.status==='approved'){
          clearInterval(S.pollInt);S.pollInt=null;showDone();return;
        }
      }catch(e){}
    }
  },3000);
}

function showDone(){
  const isBuy=S.side==='buy';
  $('#tradeCard').innerHTML=`
    <div class="tc">
      ${stepsHTML(3)}
      <div class="center-card">
        <div class="done-ring">✓</div>
        <h3>Trade complete!</h3>
        <div class="got-amt">${isBuy?'+ ':'− '}${fmtC(S.cryptoAmt,S.crypto)} ${S.crypto}</div>
        <div class="got-sub">${isBuy?'added to your wallet':'sold · '+fmtLocal(S.fiatAmt)+' on the way'}</div>
        <p>${isBuy?'Your '+S.crypto+' has been credited to your wallet.':'Payment will arrive in your account within 1–2 business days.'}</p>
        <button class="btn-main buy" id="walletBtn" style="margin-bottom:9px">View wallet</button>
        <button class="btn-ghost" id="tradeAgainBtn">Trade again</button>
      </div>
    </div>`;
  toast((isBuy?'Bought ':'Sold ')+fmtC(S.cryptoAmt,S.crypto)+' '+S.crypto);
  document.getElementById('walletBtn').addEventListener('click',()=>{
    S.tab='wallet'; [...$('#tabs').children].forEach(x=>x.classList.toggle('on',x.dataset.tab==='wallet')); render();
  });
  document.getElementById('tradeAgainBtn').addEventListener('click',()=>{
    S.tab='trade'; [...$('#tabs').children].forEach(x=>x.classList.toggle('on',x.dataset.tab==='trade')); renderTrade();
  });
}

/* ===== ORDERS ===== */

  const page=$('#page');
  page.innerHTML=`<div class="page-title">My orders</div><div class="page-sub">Your trade history.</div><div class="orders" id="oList"></div>`;
  const wrap=document.getElementById('oList');
  if(!S.orders.length){wrap.innerHTML='<div class="empty">No orders yet.</div>';return;}
  wrap.innerHTML=S.orders.map(o=>`<div class="order">
    <span class="o-side ${o.side}">${o.side.toUpperCase()}</span>
    <div><div class="who">${o.crypto} · ${o.id}</div><div class="when">${o.time}</div></div>
    <div class="amt">${fmtC(o.cryptoAmt,o.crypto)} ${o.crypto}<div class="f">${o.fiatCurrency?((FIAT_CURRENCIES[o.fiatCurrency]||{sym:'$'}).sym+(o.fiat*(o.fiatRate||1)).toLocaleString('en-US',{maximumFractionDigits:0})):fmt$0(o.fiat)}</div></div>
    <div class="pm">${o.crypto}</div>
    <div><span class="status ${o.status}"><span class="d"></span>${o.status[0].toUpperCase()+o.status.slice(1)}</span></div>
  </div>`).join('');
}


/* ===== LIVE PRICE TICK ===== */
function priceTick(){
  for(const c in S.prices){
    S.prev[c]=S.prices[c];
    const move=(Math.random()-.48)*S.prices[c]*.003;
    S.prices[c]=Math.max(1,S.prices[c]+move);
  }
  /* update conversion in step 1 */
  if(S.tab==='trade' && S.step===0){
    syncAmt();
    const rl=document.getElementById('rateLabel');
    if(rl)rl.textContent='@ '+fmtLocal(S.prices[S.crypto])+' / '+S.crypto;
  }
}

/* ===== SIGN OUT ===== */
document.getElementById('signoutBtn').addEventListener('click',async()=>{
  if(sb) await sb.auth.signOut().catch(()=>{});
  localStorage.removeItem('vouch_session');
  window.location.href='login.html';
});

/* ===== INIT ===== */
const _hash=location.hash.replace('#','');
if(_hash==='orders')S.tab='orders';
[...$('#tabs').children].forEach(x=>x.classList.toggle('on',x.dataset.tab===S.tab));
renderTopbar(); render();
fetchRates();
if(!reduce)setInterval(priceTick,3000);

/* ===== CHAT WIDGET ===== */
const CHAT_KEY='vouch_msgs';
const BC=typeof BroadcastChannel!=='undefined'?new BroadcastChannel('vouch_chat'):null;
let chatOpen=false;

function getMsgs(){return JSON.parse(localStorage.getItem(CHAT_KEY)||'[]');}
function saveMsgs(m){localStorage.setItem(CHAT_KEY,JSON.stringify(m));}
function tnow(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}

function getChatUsername(){const s=JSON.parse(localStorage.getItem('vouch_session')||'{}');return s.username||'Guest';}

function addCustMsg(text){
  const msgs=getMsgs();
  const m={id:Date.now().toString(36),from:'customer',username:getChatUsername(),text,time:tnow(),read:false,ts:Date.now()};
  msgs.push(m);saveMsgs(msgs);
  BC&&BC.postMessage({type:'message',m});
  return m;
}

function renderChatMsgs(){
  const body=document.getElementById('cpBody');if(!body)return;
  const me=getChatUsername();
  const msgs=getMsgs().filter(m=>
    (m.from==='customer'&&m.username===me)||
    (m.from==='admin'&&(!m.toUser||m.toUser===me))||
    m.from==='system'
  );
  if(!msgs.length){body.innerHTML='<div class="cm sys-m">👋 Hi! How can we help you?</div>';return;}
  body.innerHTML=msgs.map(m=>{
    if(m.from==='system')return`<div class="cm sys-m">${m.text}</div>`;
    return`<div class="cm ${m.from==='customer'?'cust':'supp'}">${m.text}<span class="ct">${m.time}</span></div>`;
  }).join('');
  body.scrollTop=body.scrollHeight;
}

function updateFabBadge(){
  const me=getChatUsername();
  const unread=getMsgs().filter(m=>m.from==='admin'&&(!m.toUser||m.toUser===me)&&!m.read).length;
  const b=document.getElementById('chatBadge');if(!b)return;
  b.textContent=unread;b.classList.toggle('show',unread>0);
}
function markAdminRead(){
  const me=getChatUsername();
  saveMsgs(getMsgs().map(m=>{if(m.from==='admin'&&(!m.toUser||m.toUser===me))m.read=true;return m;}));
  updateFabBadge();
}

document.getElementById('chatFab').addEventListener('click',()=>{
  chatOpen=!chatOpen;
  document.getElementById('chatPanel').classList.toggle('open',chatOpen);
  if(chatOpen){markAdminRead();renderChatMsgs();}
});
document.getElementById('cpClose').addEventListener('click',()=>{
  chatOpen=false;document.getElementById('chatPanel').classList.remove('open');
});
function sendCustMsg(){
  const inp=document.getElementById('cpInput');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  inp.value='';addCustMsg(text);
  if(chatOpen)renderChatMsgs();
}
document.getElementById('cpSend').addEventListener('click',sendCustMsg);
document.getElementById('cpInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendCustMsg();});

if(BC){BC.onmessage=e=>{
  if(!e.data)return;
  if(e.data.type==='message'&&e.data.m&&e.data.m.from==='admin'){
    updateFabBadge();
    if(chatOpen){markAdminRead();renderChatMsgs();}
  }
  if(e.data.type==='order'&&e.data.order?.id===S.tradeRef&&e.data.order?.status==='approved'){
    clearInterval(S.pollInt);S.pollInt=null;
    showDone();
  }
};}
updateFabBadge();
</script>

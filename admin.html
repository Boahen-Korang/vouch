<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOUCH — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08120D; --bg-2:#0B1812; --panel:#11241A; --panel-2:#152C20; --elev:#16302455;
  --line:#1F3A2C; --line-soft:#19301F;
  --paper:#ECEEE7; --muted:#8FA89A; --faint:#587063;
  --emerald:#23A86E; --emerald-br:#3FD98C; --emerald-glow:rgba(63,217,140,.3); --emerald-tint:#16382680;
  --coral:#FF6B4A; --coral-glow:rgba(255,107,74,.35); --gold:#E2B45A; --blue:#5AA9E2; --violet:#9B7AD6;
  --display:'Bricolage Grotesque',sans-serif; --body:'Hanken Grotesk',sans-serif; --mono:'Space Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--paper);font-family:var(--body);-webkit-font-smoothing:antialiased;line-height:1.5}
::selection{background:var(--coral);color:#08120D}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}
.mono{font-family:var(--mono)}

.layout{display:grid;grid-template-columns:236px 1fr;min-height:100vh}

/* ===== SIDEBAR ===== */
.side{background:var(--bg-2);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.side-top{padding:20px 18px 14px}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.02em}
.logo .mark{width:23px;height:23px;border-radius:7px;background:var(--paper);position:relative;display:grid;place-items:center}
.logo .mark::before{content:'';width:8px;height:8px;border-radius:50%;border:2.4px solid var(--coral);box-sizing:border-box}
.logo .mark::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;border:2.4px solid var(--emerald);transform:translateX(5px)}
.logo .tag{font-family:var(--mono);font-size:10px;font-weight:400;color:var(--gold);border:1px solid rgba(226,180,90,.3);padding:2px 7px;border-radius:5px;letter-spacing:.08em}
.nav{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:10px;color:var(--muted);font-size:14px;font-weight:600;transition:.18s;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--panel);color:var(--paper)}
.nav-item.on{background:var(--panel);color:var(--paper);box-shadow:inset 2px 0 0 var(--emerald-br)}
.nav-item svg{width:18px;height:18px;flex-shrink:0;stroke:currentColor}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--coral);color:#fff}
.nav-item .badge.gold{background:var(--gold);color:#08120D}
.nav-sec{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:14px 13px 6px}
.side-bot{padding:14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px}
.side-bot .av{width:34px;height:34px;border-radius:10px;background:var(--violet);display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:14px;color:#fff}
.side-bot .nm{font-size:13px;font-weight:600}.side-bot .rl{font-family:var(--mono);font-size:10px;color:var(--faint)}
.side-bot a{margin-left:auto;color:var(--faint);font-size:11px;font-family:var(--mono)}.side-bot a:hover{color:var(--emerald-br)}

/* ===== MAIN ===== */
.main{display:flex;flex-direction:column;min-width:0;background:
  radial-gradient(600px 360px at 100% -5%,rgba(63,217,140,.06),transparent 60%)}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;padding:16px clamp(18px,3vw,32px);background:rgba(8,18,13,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.pt{font-family:var(--display);font-weight:700;font-size:22px;letter-spacing:-.02em}
.pt small{display:block;font-family:var(--body);font-size:12.5px;color:var(--muted);font-weight:400;letter-spacing:0;margin-top:1px}
.tb-r{margin-left:auto;display:flex;align-items:center;gap:12px}
.search{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 13px;color:var(--paper);font-family:var(--body);font-size:13.5px;outline:none;width:200px}
.search:focus{border-color:var(--emerald-br)}
.live{font-family:var(--mono);font-size:11px;color:var(--emerald-br);display:flex;align-items:center;gap:7px;border:1px solid var(--line);padding:7px 11px;border-radius:9px}
.live .p{width:7px;height:7px;border-radius:50%;background:var(--emerald-br);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.content{padding:clamp(18px,3vw,30px) clamp(18px,3vw,32px) 70px;overflow:auto}

/* ===== KPI CARDS ===== */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:linear-gradient(160deg,rgba(20,42,30,.92),rgba(10,22,16,.92));border:1px solid var(--line);border-radius:15px;padding:18px 20px;position:relative;overflow:hidden;
  box-shadow:0 30px 60px -20px rgba(0,0,0,.75),0 0 40px -20px var(--emerald-glow),inset 0 1px 0 rgba(255,255,255,.04);backdrop-filter:blur(10px)}
.kpi .l{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.kpi .v{font-family:var(--display);font-weight:800;font-size:27px;letter-spacing:-.02em;margin-top:8px}
.kpi .t{font-family:var(--mono);font-size:11px;margin-top:7px;display:flex;align-items:center;gap:5px}
.kpi .t.up{color:var(--emerald-br)}.kpi .t.down{color:var(--coral)}.kpi .t.flat{color:var(--muted)}
.kpi .ic{position:absolute;right:16px;top:16px;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;opacity:.9}
.kpi .ic svg{width:17px;height:17px}
@media(max-width:1100px){.kpis{grid-template-columns:repeat(2,1fr)}}

/* ===== PANELS / CHARTS ===== */
.grid2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:22px}
@media(max-width:980px){.grid2{grid-template-columns:1fr}}
.card{background:linear-gradient(160deg,rgba(20,42,30,.92),rgba(10,22,16,.92));border:1px solid var(--line);border-radius:18px;padding:20px;
  box-shadow:0 40px 80px -30px rgba(0,0,0,.8),0 0 60px -30px var(--emerald-glow),inset 0 1px 0 rgba(255,255,255,.04);
  backdrop-filter:blur(12px)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-h h3{font-family:var(--display);font-weight:700;font-size:16px}
.card-h .sub{font-family:var(--mono);font-size:11px;color:var(--faint)}
canvas{display:block;width:100%}
.legend{display:flex;gap:16px;margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--muted);flex-wrap:wrap}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend .sw{width:10px;height:10px;border-radius:3px}

.statusbars{display:flex;flex-direction:column;gap:13px}
.sb .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.sb .top .n{font-family:var(--mono);font-weight:700}
.sb .track{height:8px;background:var(--bg);border-radius:5px;overflow:hidden}
.sb .fill{height:100%;border-radius:5px}

.feed{display:flex;flex-direction:column;gap:1px}
.fe{display:flex;align-items:flex-start;gap:11px;padding:11px 0;border-bottom:1px solid var(--line-soft);font-size:13.5px}
.fe:last-child{border-bottom:none}
.fe .dot{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.fe .tm{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap}
.fe b{font-weight:600}

/* ===== TABLES ===== */
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.ftabs{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.ftabs button{background:none;border:none;color:var(--muted);font-weight:600;font-size:13px;padding:8px 15px;border-radius:7px}
.ftabs button.on{background:var(--panel-2);color:var(--paper)}
.tbl{background:var(--panel);border:1px solid var(--line);border-radius:15px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);text-align:left;padding:13px 18px;border-bottom:1px solid var(--line);font-weight:500;white-space:nowrap}
tbody td{padding:14px 18px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr.click{cursor:pointer;transition:background .15s}
tbody tr.click:hover{background:var(--panel-2)}
.uav{width:32px;height:32px;border-radius:9px;display:inline-grid;place-items:center;font-family:var(--display);font-weight:700;font-size:12px;color:#fff;vertical-align:middle;margin-right:9px}
.cell-u{display:flex;align-items:center}
.cell-u .nm{font-weight:600}.cell-u .sub{font-family:var(--mono);font-size:11px;color:var(--faint)}
.mono-c{font-family:var(--mono);font-size:13px}
.pill{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.pill .d{width:6px;height:6px;border-radius:50%}
.pill.green{background:var(--emerald-tint);color:var(--emerald-br)}.pill.green .d{background:var(--emerald-br)}
.pill.gold{background:rgba(226,180,90,.14);color:var(--gold)}.pill.gold .d{background:var(--gold)}
.pill.coral{background:rgba(255,107,74,.14);color:var(--coral)}.pill.coral .d{background:var(--coral)}
.pill.blue{background:rgba(90,169,226,.14);color:var(--blue)}.pill.blue .d{background:var(--blue)}
.pill.grey{background:var(--bg);color:var(--muted)}.pill.grey .d{background:var(--muted)}
.tbtn{font-family:var(--body);font-weight:700;font-size:12.5px;padding:7px 13px;border-radius:8px;border:1px solid transparent}
.tbtn.g{background:var(--emerald);color:#04130C}.tbtn.g:hover{background:var(--emerald-br)}
.tbtn.r{background:none;border-color:var(--line);color:var(--coral)}.tbtn.r:hover{border-color:var(--coral)}
.tbtn.b{background:none;border-color:var(--line);color:var(--paper)}.tbtn.b:hover{border-color:var(--emerald-br);color:var(--emerald-br)}
.tbtn:disabled{opacity:.4;pointer-events:none}
.row-act{display:flex;gap:7px;justify-content:flex-end}
.empty{text-align:center;padding:46px;color:var(--faint);font-family:var(--mono);font-size:13px}

/* ===== DISPUTE DETAIL ===== */
.back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-family:var(--mono);font-size:12px;margin-bottom:16px;background:none;border:none}
.back:hover{color:var(--paper)}
.disp-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px}
@media(max-width:980px){.disp-grid{grid-template-columns:1fr}}
.disp-summary{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line-soft);border-radius:12px;overflow:hidden;margin-bottom:16px}
.ds{background:var(--panel);padding:14px 16px}
.ds .k{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.ds .v{font-family:var(--mono);font-size:14px;margin-top:5px;font-weight:600}
.claims{display:flex;flex-direction:column;gap:12px;margin-bottom:18px}
.claim{border:1px solid var(--line);border-radius:12px;padding:15px}
.claim.buyer{border-left:3px solid var(--coral)}
.claim.seller{border-left:3px solid var(--emerald-br)}
.claim .who{font-family:var(--mono);font-size:11px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:8px}
.claim.buyer .who{color:var(--coral)}.claim.seller .who{color:var(--emerald-br)}
.claim p{font-size:13.5px;color:var(--muted);line-height:1.55}
.evidence{display:flex;gap:9px;margin-top:11px;flex-wrap:wrap}
.ev{font-family:var(--mono);font-size:11px;color:var(--blue);border:1px solid var(--line);border-radius:8px;padding:7px 11px;display:flex;align-items:center;gap:7px}
.ev svg{width:13px;height:13px}
.resolve{background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:18px}
.resolve h4{font-family:var(--display);font-weight:700;font-size:15px;margin-bottom:5px}
.resolve .note{font-size:12.5px;color:var(--muted);margin-bottom:16px}
.resolve-actions{display:flex;flex-direction:column;gap:9px}
.rbtn{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:11px;border:1px solid var(--line);background:var(--panel);text-align:left;transition:.18s;width:100%}
.rbtn:hover{transform:translateY(-1px)}
.rbtn .ric{width:36px;height:36px;border-radius:9px;display:grid;place-items:center;flex-shrink:0}
.rbtn .rt{font-weight:700;font-size:14px}.rbtn .rd{font-size:12px;color:var(--muted);margin-top:2px}
.rbtn.toBuyer:hover{border-color:var(--coral)}.rbtn.toBuyer .ric{background:rgba(255,107,74,.15);color:var(--coral)}
.rbtn.toSeller:hover{border-color:var(--emerald-br)}.rbtn.toSeller .ric{background:var(--emerald-tint);color:var(--emerald-br)}
.rbtn.info:hover{border-color:var(--blue)}.rbtn.info .ric{background:rgba(90,169,226,.15);color:var(--blue)}
.transcript{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:9px;padding:4px}
.tmsg{max-width:84%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.4}
.tmsg.b{background:rgba(255,107,74,.12);align-self:flex-start}
.tmsg.s{background:var(--emerald-tint);align-self:flex-end}
.tmsg.sys{align-self:center;font-family:var(--mono);font-size:10.5px;color:var(--muted);background:var(--bg);border:1px solid var(--line);padding:6px 12px;border-radius:18px}
.tmsg .who{font-family:var(--mono);font-size:9.5px;opacity:.7;display:block;margin-bottom:3px}

/* settings */
.set-row:last-child{border-bottom:none}
.set-row .k{font-weight:600;font-size:14px}.set-row .d{font-size:12.5px;color:var(--muted);margin-top:3px}
.set-input{background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--paper);font-family:var(--mono);font-size:13px;padding:9px 12px;width:110px;outline:none;text-align:right}
.set-input:focus{border-color:var(--emerald-br)}
.toggle-sw{width:46px;height:26px;border-radius:20px;background:var(--bg);border:1px solid var(--line);position:relative;transition:.2s}
.toggle-sw::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--faint);transition:.2s}
.toggle-sw.on{background:var(--emerald);border-color:var(--emerald)}.toggle-sw.on::after{left:22px;background:#04130C}

/* toast */
.toasts{position:fixed;bottom:22px;right:22px;z-index:120;display:flex;flex-direction:column;gap:9px;align-items:flex-end}
.toast{background:var(--panel-2);border:1px solid var(--line);border-radius:11px;padding:12px 18px;font-size:13.5px;font-weight:600;box-shadow:0 20px 40px -16px rgba(0,0,0,.7);display:flex;align-items:center;gap:10px;animation:tin .3s}
.toast .d{width:8px;height:8px;border-radius:50%;background:var(--emerald-br)}
.toast.warn .d{background:var(--gold)}.toast.bad .d{background:var(--coral)}
@keyframes tin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}

/* ===== ORDER MODAL ===== */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadein .18s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--panel-2);border:1px solid var(--line);border-radius:18px;padding:26px;max-width:440px;width:92vw;position:relative;box-shadow:0 32px 80px -24px rgba(0,0,0,.9);max-height:90vh;overflow-y:auto}
.modal-box h4{font-family:var(--display);font-weight:700;font-size:18px;margin-bottom:18px}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--faint);font-size:24px;cursor:pointer;line-height:1;padding:2px 8px;transition:.15s}
.modal-close:hover{color:var(--paper)}
.drow{padding:11px 0;border-bottom:1px solid var(--line-soft);display:flex;flex-direction:column;gap:3px}
.drow:last-child{border-bottom:none}
.drow .dk{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint)}
.drow .dv{font-family:var(--mono);font-size:13px;word-break:break-all;color:var(--paper)}
/* settings wide input */
.set-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--line-soft);gap:10px;flex-wrap:wrap}
.set-input-wide{background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--paper);font-family:var(--mono);font-size:12px;padding:9px 12px;width:100%;max-width:340px;outline:none;transition:.15s}
.set-input-wide:focus{border-color:var(--emerald-br)}

@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .side{position:static;height:auto;flex-direction:column;border-right:none;border-bottom:1px solid var(--line)}
  .nav{flex-direction:row;overflow-x:auto;padding:8px;scrollbar-width:none}.nav::-webkit-scrollbar{display:none}.nav-sec{display:none}.nav-item{white-space:nowrap}
  .side-bot{display:none}
  .search{width:130px}
}
@media(max-width:600px){
  .kpis{grid-template-columns:1fr}
  .tbl{overflow-x:auto}
  table{min-width:560px}
  .content{padding:14px 14px 60px}
  .topbar{padding:12px 14px;gap:10px}
  .pt{font-size:18px}
  .search{width:100px;font-size:12px}
  .live{display:none}
  .disp-summary{grid-template-columns:1fr}
  .resolve{padding:14px}
  .card{padding:14px}
  .kpi{padding:14px 16px}
  .kpi .v{font-size:22px}
  .nav-item{padding:9px 11px;font-size:13px;gap:8px}
  .nav-item svg{width:16px;height:16px}
}
/* ===== CHAT ADMIN ===== */
.chat-layout{display:grid;grid-template-columns:260px 1fr;gap:0;height:calc(100vh - 130px);min-height:400px;background:var(--panel);border:1px solid var(--line);border-radius:15px;overflow:hidden}
.chat-sidebar{border-right:1px solid var(--line);display:flex;flex-direction:column}
.chat-sb-head{padding:14px 16px;border-bottom:1px solid var(--line);font-family:var(--display);font-weight:700;font-size:15px}
.chat-conv{display:flex;align-items:center;gap:11px;padding:12px 16px;cursor:pointer;border-bottom:1px solid var(--line-soft);transition:.15s}
.chat-conv:hover{background:var(--panel-2)}.chat-conv.on{background:var(--panel-2);box-shadow:inset 2px 0 0 var(--emerald-br)}
.chat-conv .cav{width:36px;height:36px;border-radius:10px;background:var(--emerald);display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:14px;color:#04130C;flex-shrink:0}
.chat-conv .cnm{font-weight:600;font-size:13.5px}.chat-conv .cprev{font-size:12px;color:var(--faint);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:130px}
.chat-conv .ctime{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--faint);flex-shrink:0}
.chat-conv .cunread{width:18px;height:18px;border-radius:50%;background:var(--coral);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-main{display:flex;flex-direction:column}
.chat-main-head{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;flex-shrink:0}
.chat-main-head .cav{width:36px;height:36px;border-radius:10px;background:var(--emerald);display:grid;place-items:center;font-family:var(--display);font-weight:700;font-size:14px;color:#04130C}
.chat-main-head .info .nm{font-weight:700;font-size:14px}.chat-main-head .info .st{font-family:var(--mono);font-size:10.5px;color:var(--emerald-br);display:flex;align-items:center;gap:5px}
.chat-main-head .info .st::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--emerald-br)}

<script>
"use strict";
const $=s=>document.querySelector(s), el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
const fmt$=n=>'$'+Math.round(n).toLocaleString('en-US');
const fmt$2=n=>'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const initials=n=>n.replace(/[._]/g,' ').split(' ').filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
const COL=['#23A86E','#FF6B4A','#E2B45A','#5AA9E2','#9B7AD6'];
const colorFor=n=>COL[[...n].reduce((a,c)=>a+c.charCodeAt(0),0)%COL.length];
function toast(msg,kind){const t=el('div','toast'+(kind?' '+kind:''));t.innerHTML='<span class="d"></span>'+msg;$('#toasts').appendChild(t);setTimeout(()=>{t.style.opacity=0;t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2800);}

/* ===== STATE ===== */
const S={
  view:'overview', search:'',
  trades:[], disputes:[], offers:[],
  tradeFilter:'all', dispFilter:'open', userFilter:'all', chatUser:null,
};

/* ===== BADGES ===== */
const CHAT_KEY='vouch_msgs';
const BC=typeof BroadcastChannel!=='undefined'?new BroadcastChannel('vouch_chat'):null;
function getMsgs(){return JSON.parse(localStorage.getItem(CHAT_KEY)||'[]');}
function saveMsgs(m){localStorage.setItem(CHAT_KEY,JSON.stringify(m));}
function tnow(){const d=new Date();return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');}
function unreadCount(){return getMsgs().filter(m=>m.from==='customer'&&!m.read).length;}

function refreshBadges(){
  const d=S.disputes.filter(x=>x.status==='open').length;
  const accs=JSON.parse(localStorage.getItem('vouch_accounts')||'[]');
  const k=accs.filter(a=>a.kyc==='pending').length;
  const ch=unreadCount();
  const pendingOrders=JSON.parse(localStorage.getItem('vouch_orders')||'[]').filter(o=>o.status==='pending').length;
  $('#bDisp').textContent=d; $('#bDisp').style.display=d?'':'none';
  $('#bKyc').textContent=k; $('#bKyc').style.display=k?'':'none';
  $('#bChat').textContent=ch; $('#bChat').style.display=ch?'':'none';
  $('#bTrades').textContent=pendingOrders; $('#bTrades').style.display=pendingOrders?'':'none';
}
if(BC){BC.onmessage=e=>{
  if(!e.data)return;
  if(e.data.type==='message'){refreshBadges();if(S.view==='chat')renderChatView($('#content'));}
  if(e.data.type==='order'){refreshBadges();if(S.view==='trades')renderTrades($('#content'));}
};}

/* ===== NAV ===== */
const TITLES={overview:['Overview','Platform health at a glance'],trades:['Trades','Review and action customer orders'],
  disputes:['Disputes','Resolve held-escrow conflicts'],users:['Users & KYC','Verify identities and manage accounts'],
  offers:['Rates','Live BTC · ETH · USDT exchange rates'],chat:['Chat','Message customers in real time'],settings:['Settings','Platform configuration']};
$('#nav').addEventListener('click',e=>{const b=e.target.closest('.nav-item');if(!b)return;
  S.view=b.dataset.v; S.search='';$('#search').value='';if(S.view!=='chat')S.chatUser=null;
  [...$('#nav').children].forEach(x=>x.classList&&x.classList.toggle('on',x===b));
  $('#ptitle').childNodes[0].nodeValue=TITLES[S.view][0]; $('#psub').textContent=TITLES[S.view][1];
  render();});
$('#search').addEventListener('input',e=>{S.search=e.target.value.toLowerCase();render();});

/* ===== ROUTER ===== */
function render(){
  const c=$('#content');
  if(S.view==='overview')renderOverview(c);
  else if(S.view==='trades')renderTrades(c);
  else if(S.view==='disputes')renderDisputes(c);
  else if(S.view==='users')renderUsers(c);
  else if(S.view==='offers')renderRates(c);
  else if(S.view==='chat')renderChatView(c);
  else renderSettings(c);
}

/* ===== OVERVIEW ===== */
function renderOverview(c){
  const realOrders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
  const allOrders=[...realOrders,...S.trades];
  const pending=realOrders.filter(o=>o.status==='pending').length;
  const completed=realOrders.filter(o=>o.status==='completed'||o.status==='approved').length;
  const rejected=realOrders.filter(o=>o.status==='rejected').length;
  const disputed=realOrders.filter(o=>o.status==='disputed').length;
  const totalFiat=realOrders.reduce((s,o)=>s+(o.fiatAmt||0),0);
  const estFees=Math.round(totalFiat*0.005);
  const registeredUsers=JSON.parse(localStorage.getItem('vouch_accounts')||'[]').length;
  const totalAll=realOrders.length||1;
  c.innerHTML=`
  <div class="kpis">
    ${kpiCard('Total volume',realOrders.length?fmt$(totalFiat):'—',0,'','#23A86E','M2 17l6-6 4 4 8-8')}
    ${kpiCard('Pending orders',pending||'—',0,'','#E2B45A','coin')}
    ${kpiCard('Registered users',registeredUsers||'—',0,'','#9B7AD6','users')}
    ${kpiCard('Est. fees',realOrders.length?fmt$(estFees):'—',0,'','#5AA9E2','coin')}
  </div>
  <div class="grid2">
    <div class="card"><div class="card-h"><h3>Trading volume</h3><span class="sub">last 14 days · $K</span></div>
      <canvas id="volChart" height="220"></canvas></div>
    <div class="card"><div class="card-h"><h3>Orders by status</h3><span class="sub">${realOrders.length} total</span></div>
      ${realOrders.length?`<div class="statusbars">
        ${statusBar2('Pending review',pending,'#E2B45A',totalAll)}
        ${statusBar2('Completed',completed,'#3FD98C',totalAll)}
        ${statusBar2('Disputed',disputed,'#FF6B4A',totalAll)}
        ${statusBar2('Rejected',rejected,'#587063',totalAll)}
      </div>`:'<div style="padding:20px 0;font-family:var(--mono);font-size:12px;color:var(--faint);text-align:center">No orders yet.</div>'}
    </div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-h"><h3>Activity feed</h3><span class="sub">live</span></div>
      <div class="feed" id="feed"></div></div>
    <div class="card"><div class="card-h"><h3>Needs attention</h3></div>
      <div class="statusbars">
        ${attn('Pending orders',pending,'#E2B45A','trades')}
        ${attn('Open disputes',realOrders.filter(o=>o.status==='disputed').length,'#FF6B4A','disputes')}
        ${attn('Pending KYC reviews',JSON.parse(localStorage.getItem('vouch_accounts')||'[]').filter(a=>a.kyc==='pending').length,'#9B7AD6','users')}
      </div></div>
  </div>`;
  drawVolChart();
  renderFeed();
  c.querySelectorAll('[data-goto]').forEach(b=>b.addEventListener('click',()=>gotoView(b.dataset.goto)));
}
function kpiCard(l,v,trend,unit,color,icon){
  const dir=trend>0?'up':(trend<0?'down':'flat');
  const arrow=trend>0?'▲':(trend<0?'▼':'•');
  const ics={'M2 17l6-6 4 4 8-8':'<path d="M2 17l6-6 4 4 8-8"/><path d="M20 7h-4M20 7v4"/>','rect':'<rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>','users':'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>','coin':'<circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1 1.3-1.5 3-1.5s3 .8 3 2-1.5 1.5-3 1.5-3 .5-3 1.5 1.3 2 3 2 3-.5 3-1.5"/>'};
  return `<div class="kpi"><div class="ic" style="background:${color}22;color:${color}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">${ics[icon]||ics.coin}</svg></div>
    <div class="l">${l}</div><div class="v">${v}</div>
    <div class="t ${dir}">${arrow} ${trend>0?'+':''}${trend}${unit}</div></div>`;
}
function statusBar(label,n,color){
  const pct=Math.round(n/Math.max(1,S.trades.length)*100);
  return `<div class="sb"><div class="top"><span>${label}</span><span class="n" style="color:${color}">${n}</span></div>
    <div class="track"><div class="fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}
function statusBar2(label,n,color,total){
  const pct=Math.round(n/Math.max(1,total)*100);
  return `<div class="sb"><div class="top"><span>${label}</span><span class="n" style="color:${color}">${n}</span></div>
    <div class="track"><div class="fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}
function attn(label,n,color,goto){
  return `<div class="sb" style="cursor:pointer" data-goto="${goto}"><div class="top"><span>${label}</span><span class="n" style="color:${n?color:'var(--muted)'}">${n} →</span></div>
    <div class="track"><div class="fill" style="width:${Math.min(100,n*18)}%;background:${color}"></div></div></div>`;
}
function gotoView(v){const btn=[...$('#nav').children].find(x=>x.dataset&&x.dataset.v===v);if(btn)btn.click();}
function renderFeed(){
  const feed=$('#feed'); if(!feed)return;
  const realOrders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
  const items=realOrders.slice().reverse().slice(0,6).map(o=>{
    const dt=new Date(o.ts);
    const tstr=dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0');
    const color=o.side==='sell'?'#FF6B4A':'#3FD98C';
    const label=o.side==='sell'
      ?`<b>${o.id}</b> SELL — ${o.cryptoAmt} ${o.crypto} · payout to ${o.payoutMethod==='momo'?'MoMo':'bank'}`
      :`<b>${o.id}</b> BUY — ${o.cryptoAmt} ${o.crypto} · send to wallet`;
    return [color,label,tstr];
  });
  if(!items.length){feed.innerHTML='<div style="padding:20px 0;font-family:var(--mono);font-size:12px;color:var(--faint);text-align:center">No activity yet.</div>';return;}
  feed.innerHTML=items.map(i=>`<div class="fe"><span class="dot" style="background:${i[0]}"></span><span>${i[1]}</span><span class="tm">${i[2]}</span></div>`).join('');
}
function getVolSeries(){
  const orders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
  const buckets=new Array(14).fill(0);
  const now=Date.now();
  orders.forEach(o=>{
    const daysAgo=Math.floor((now-o.ts)/86400000);
    if(daysAgo>=0&&daysAgo<14)buckets[13-daysAgo]+=(o.fiatAmt||0)/1000;
  });
  return buckets;
}
function drawVolChart(){
  const cv=$('#volChart'); if(!cv)return;
  const ctx=cv.getContext('2d'); const W=cv.clientWidth,H=220;
  cv.width=W*devicePixelRatio; cv.height=H*devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.clearRect(0,0,W,H);
  const d=getVolSeries(), max=Math.max(...d)*1.15||1, padB=22,padT=8;
  const bw=W/d.length;
  for(let g=0;g<=3;g++){const y=padT+(H-padB-padT)*g/3;ctx.strokeStyle='rgba(31,58,44,.7)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  d.forEach((v,i)=>{
    const bh=(v/max)*(H-padB-padT); const x=i*bw+bw*0.18; const w=bw*0.64; const y=H-padB-bh;
    const grad=ctx.createLinearGradient(0,y,0,H-padB);grad.addColorStop(0,'#3FD98C');grad.addColorStop(1,'rgba(63,217,140,.25)');
    ctx.fillStyle=i===d.length-1?'#3FD98C':grad; ctx.beginPath();
    if(ctx.roundRect)ctx.roundRect(x,y,w,bh,4);else ctx.rect(x,y,w,bh); ctx.fill();
  });
  ctx.fillStyle='#587063';ctx.font='10px "Space Mono"';ctx.fillText('14d ago',2,H-6);ctx.textAlign='right';ctx.fillText('today',W-2,H-6);ctx.textAlign='left';
}

/* ===== TRADES ===== */
function renderTrades(c){
  const realOrders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
  const pending=realOrders.filter(o=>o.status==='pending').length;
  const filters=['all','pending','completed','rejected'];
  c.innerHTML=`
  <div class="toolbar"><div class="ftabs" id="tFilter">
    ${filters.map(f=>`<button data-f="${f}" class="${S.tradeFilter===f?'on':''}">${f==='pending'?`Pending${pending?' ('+pending+')':''}`:(f[0].toUpperCase()+f.slice(1))}</button>`).join('')}
  </div></div>
  <div class="tbl"><table><thead><tr><th>Trade</th><th>Side</th><th>Amount</th><th>Details</th><th>Status</th><th></th></tr></thead>
  <tbody id="tradeRows"></tbody></table></div>`;
  $('#tFilter').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;S.tradeFilter=b.dataset.f;renderTrades(c);});
  const rows=$('#tradeRows');
  const smap={pending:['gold','Pending review'],completed:['green','Completed'],approved:['green','Completed'],rejected:['coral','Rejected']};
  let allTrades=[];
  realOrders.forEach(o=>{
    const dt=new Date(o.ts);
    const tstr=dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0')+' · '+dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const details=o.side==='buy'
      ?`Wallet: ${(o.walletAddr||'').slice(0,14)}…`
      :(o.payoutMethod==='momo'?'MoMo · '+(o.payoutDetails?.number||''):'Bank · '+(o.payoutDetails?.account||''));
    allTrades.push({id:o.id,side:o.side,crypto:o.crypto,cryptoAmt:o.cryptoAmt,fiatAmt:o.fiatAmt,details,status:o.status==='approved'?'completed':o.status,time:tstr,_real:true,_oid:o.id});
  });
  let list=allTrades.filter(t=>S.tradeFilter==='all'||t.status===S.tradeFilter);
  if(S.search)list=list.filter(t=>(t.id+t.crypto+t.details).toLowerCase().includes(S.search));
  if(!list.length){rows.innerHTML=`<tr><td colspan="6"><div class="empty">${allTrades.length?'No trades match this filter.':'No orders yet.'}</div></td></tr>`;return;}
  rows.innerHTML=list.map(t=>{
    const sm=smap[t.status]||['grey',t.status];
    const sideCol=t.side==='sell'?'var(--coral)':'var(--emerald-br)';
    const action=`<button class="tbtn g" data-okey="${t._oid}">Details →</button>`;
    return `<tr>
      <td class="mono-c"><b>${t.id}</b><div style="color:var(--faint);font-size:11px">${t.time}</div></td>
      <td><span class="pill ${t.side==='sell'?'coral':'green'}"><span class="d"></span>${t.side.toUpperCase()}</span></td>
      <td class="mono-c">${t.cryptoAmt} ${t.crypto}<div style="color:var(--faint);font-size:11px">$${Math.round(t.fiatAmt).toLocaleString()}</div></td>
      <td style="font-size:12px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.details}</td>
      <td><span class="pill ${sm[0]}"><span class="d"></span>${sm[1]}</span></td>
      <td class="row-act">${action}</td>
    </tr>`;}).join('');
  rows.querySelectorAll('[data-okey]').forEach(b=>b.addEventListener('click',()=>{
    const o=realOrders.find(x=>x.id===b.dataset.okey);
    if(o)showOrderModal(o,c);
  }));
}

function showOrderModal(o,c){
  const isSell=o.side==='sell';
  const dt=new Date(o.ts);
  const timeStr=dt.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' · '+dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0');
  let detailsHTML='';
  if(isSell&&o.payoutDetails){
    const pd=o.payoutDetails;
    const nets={mtn:'MTN Mobile Money',vodafone:'Vodafone Cash',airteltigo:'AirtelTigo Money'};
    detailsHTML=pd.type==='momo'
      ?`<div class="drow"><div class="dk">Payout type</div><div class="dv">Mobile Money</div></div>
         <div class="drow"><div class="dk">Network</div><div class="dv">${nets[pd.network]||pd.network}</div></div>
         <div class="drow"><div class="dk">MoMo number</div><div class="dv">${pd.number}</div></div>
         <div class="drow"><div class="dk">Account name</div><div class="dv">${pd.name}</div></div>`
      :`<div class="drow"><div class="dk">Payout type</div><div class="dv">Bank Account</div></div>
        <div class="drow"><div class="dk">Bank</div><div class="dv">${pd.bankName}</div></div>
        <div class="drow"><div class="dk">Account number</div><div class="dv">${pd.account}</div></div>
        <div class="drow"><div class="dk">Account holder</div><div class="dv">${pd.holder}</div></div>`;
  } else if(!isSell&&o.walletAddr){
    detailsHTML=`<div class="drow"><div class="dk">Destination wallet (${o.crypto})</div><div class="dv">${o.walletAddr}</div></div>`;
  }
  if(o.proof){
    detailsHTML+=`<div class="drow" style="flex-direction:column;align-items:flex-start;gap:8px">
      <div class="dk">Proof of payment</div>
      <img src="${o.proof}" style="width:100%;max-height:220px;object-fit:contain;border-radius:8px;background:#070f0a;margin-top:2px">
    </div>`;
  }
  const ov=document.createElement('div');
  ov.className='modal-ov';
  ov.innerHTML=`<div class="modal-box">
    <button class="modal-close" id="mClose">×</button>
    <h4><span style="color:${isSell?'var(--coral)':'var(--emerald-br)'}">${isSell?'SELL':'BUY'}</span> · ${o.id}</h4>
    <div class="drow"><div class="dk">Crypto</div><div class="dv">${o.cryptoAmt} ${o.crypto}</div></div>
    <div class="drow"><div class="dk">Fiat value</div><div class="dv">$${Math.round(o.fiatAmt).toLocaleString('en-US')}</div></div>
    <div class="drow"><div class="dk">Submitted</div><div class="dv">${timeStr}</div></div>
    <div class="drow"><div class="dk">Status</div><div class="dv" style="color:var(--gold)">Pending review</div></div>
    ${detailsHTML}
    <div style="display:flex;gap:9px;margin-top:20px;flex-wrap:wrap">
      <button class="tbtn g" id="mApprove" style="flex:1;padding:11px;min-width:120px">${isSell?'Mark as paid ✓':'Mark as sent ✓'}</button>
      <button class="tbtn r" id="mReject" style="flex:1;padding:11px;min-width:100px">Reject ✗</button>
      ${o.status==='pending'?`<button class="tbtn b" id="mDispute" style="width:100%;padding:10px;margin-top:2px">Flag as dispute</button>`:''}
    </div>
  </div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.addEventListener('click',e=>{if(e.target===ov)close();});
  document.getElementById('mClose').addEventListener('click',close);
  document.getElementById('mApprove').addEventListener('click',()=>{
    const orders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
    const idx=orders.findIndex(x=>x.id===o.id);
    if(idx>=0){orders[idx].status='approved';localStorage.setItem('vouch_orders',JSON.stringify(orders));}
    toast((isSell?'Payment sent · ':'Crypto sent · ')+o.id); close(); refreshBadges(); if(S.view==='trades')renderTrades(c||$('#content'));
  });
  document.getElementById('mReject').addEventListener('click',()=>{
    const orders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
    const idx=orders.findIndex(x=>x.id===o.id);
    if(idx>=0){orders[idx].status='rejected';localStorage.setItem('vouch_orders',JSON.stringify(orders));}
    toast('Order rejected · '+o.id,'bad'); close(); refreshBadges(); if(S.view==='trades')renderTrades(c||$('#content'));
  });
  const mDisp=document.getElementById('mDispute');
  if(mDisp)mDisp.addEventListener('click',()=>{
    const orders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
    const idx=orders.findIndex(x=>x.id===o.id);
    if(idx>=0){orders[idx].status='disputed';localStorage.setItem('vouch_orders',JSON.stringify(orders));}
    toast('Order flagged as dispute · '+o.id,'warn'); close(); refreshBadges();
    if(S.view==='trades')renderTrades(c||$('#content'));
    if(S.view==='disputes')renderDisputes(c||$('#content'));
  });
}

/* ===== DISPUTES ===== */
function renderDisputes(c){
  const allOrders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
  const open=allOrders.filter(o=>o.status==='disputed');
  const resolved=allOrders.filter(o=>o.status==='dispute-resolved');
  const list=S.dispFilter==='open'?open:resolved;
  const filtered=S.search?list.filter(o=>(o.id+o.crypto+(o.payoutDetails?.number||o.walletAddr||'')).toLowerCase().includes(S.search)):list;
  c.innerHTML=`
  <div class="toolbar"><div class="ftabs" id="dFilter">
    <button data-f="open" class="${S.dispFilter==='open'?'on':''}">Open${open.length?` (${open.length})`:''}</button>
    <button data-f="resolved" class="${S.dispFilter==='resolved'?'on':''}">Resolved</button>
  </div></div>
  <div class="tbl"><table><thead><tr><th>Order</th><th>Side</th><th>Amount</th><th>Details</th><th>Flagged</th><th></th></tr></thead>
  <tbody id="dispRows"></tbody></table></div>`;
  $('#dFilter').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;S.dispFilter=b.dataset.f;renderDisputes(c);});
  const rows=$('#dispRows');
  if(!filtered.length){rows.innerHTML=`<tr><td colspan="6"><div class="empty">${S.dispFilter==='open'?'No open disputes — all clear. ✓':'No resolved disputes yet.'}</div></td></tr>`;return;}
  rows.innerHTML=filtered.map(o=>{
    const dt=new Date(o.ts);
    const tstr=dt.getHours().toString().padStart(2,'0')+':'+dt.getMinutes().toString().padStart(2,'0')+' · '+dt.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
    const details=o.side==='buy'
      ?`Wallet: ${(o.walletAddr||'').slice(0,16)}…`
      :(o.payoutMethod==='momo'?'MoMo · '+(o.payoutDetails?.number||''):'Bank · '+(o.payoutDetails?.account||''));
    const pill=o.status==='dispute-resolved'?'<span class="pill green"><span class="d"></span>Resolved</span>':'<span class="pill coral"><span class="d"></span>Open</span>';
    return `<tr>
      <td class="mono-c"><b>${o.id}</b><div style="color:var(--faint);font-size:11px">${tstr}</div></td>
      <td><span class="pill ${o.side==='sell'?'coral':'green'}"><span class="d"></span>${o.side.toUpperCase()}</span></td>
      <td class="mono-c">${o.cryptoAmt} ${o.crypto}<div style="color:var(--faint);font-size:11px">$${Math.round(o.fiatAmt).toLocaleString()}</div></td>
      <td style="font-size:12px;color:var(--muted)">${details}</td>
      <td>${pill}</td>
      <td class="row-act">${o.status==='disputed'?`<button class="tbtn g" data-res="${o.id}">Resolve →</button><button class="tbtn r" data-rej="${o.id}">Reject</button>`:''}</td>
    </tr>`;
  }).join('');
  rows.querySelectorAll('[data-res]').forEach(b=>b.addEventListener('click',()=>{
    const orders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
    const idx=orders.findIndex(x=>x.id===b.dataset.res);
    if(idx>=0){orders[idx].status='dispute-resolved';localStorage.setItem('vouch_orders',JSON.stringify(orders));}
    toast('Dispute resolved · '+b.dataset.res); refreshBadges(); renderDisputes(c);
  }));
  rows.querySelectorAll('[data-rej]').forEach(b=>b.addEventListener('click',()=>{
    const orders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
    const idx=orders.findIndex(x=>x.id===b.dataset.rej);
    if(idx>=0){orders[idx].status='rejected';localStorage.setItem('vouch_orders',JSON.stringify(orders));}
    toast('Order rejected · '+b.dataset.rej,'bad'); refreshBadges(); renderDisputes(c);
  }));
}

/* ===== USERS ===== */
function getAccounts(){return JSON.parse(localStorage.getItem('vouch_accounts')||'[]');}
function saveAccounts(a){localStorage.setItem('vouch_accounts',JSON.stringify(a));}
async function syncAccountsFromSupabase(){
  if(!sb)return;
  const {data,error}=await sb.from('profiles').select('*');
  if(error||!data)return;
  const local=getAccounts();
  const merged=data.map(p=>({
    username:p.username, email:p.email, joined:p.joined||'—', kyc:p.kyc||'unverified',
  }));
  /* merge in any local-only entries not yet in Supabase */
  local.forEach(l=>{if(!merged.find(m=>m.email===l.email))merged.push(l);});
  saveAccounts(merged);
  refreshBadges();
  if(S.view==='users')renderUsers($('#content'));
  if(S.view==='overview')renderOverview($('#content'));
}
function renderUsers(c){
  const accs=getAccounts();
  const allOrders=JSON.parse(localStorage.getItem('vouch_orders')||'[]');
  const pendingKyc=accs.filter(a=>a.kyc==='pending').length;
  const verifiedCount=accs.filter(a=>a.kyc==='verified').length;
  c.innerHTML=`
  <div class="toolbar" style="flex-wrap:wrap;gap:10px">
    <div class="ftabs" id="uFilter">
      <button data-f="all" class="${S.userFilter==='all'?'on':''}">All (${accs.length})</button>
      <button data-f="pending" class="${S.userFilter==='pending'?'on':''}">Pending${pendingKyc?` (${pendingKyc})`:''}</button>
      <button data-f="verified" class="${S.userFilter==='verified'?'on':''}">Verified${verifiedCount?` (${verifiedCount})`:''}</button>
      <button data-f="unverified" class="${S.userFilter==='unverified'?'on':''}">Unverified</button>
      <button data-f="banned" class="${S.userFilter==='banned'?'on':''}">Banned</button>
    </div>
  </div>
  <div class="tbl"><table><thead><tr><th>User</th><th>Email</th><th>Joined</th><th>Trades</th><th>KYC</th><th></th></tr></thead>
  <tbody id="userRows"></tbody></table></div>`;
  $('#uFilter').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;S.userFilter=b.dataset.f;renderUsers(c);});
  const rows=$('#userRows');
  let list=accs.map(a=>{
    const uOrders=allOrders.filter(o=>o.username===a.username||o.user===a.username);
    return {name:a.username,email:a.email,joined:a.joined||'—',kyc:a.kyc||'unverified',
      total:uOrders.length,
      done:uOrders.filter(o=>o.status==='completed'||o.status==='approved'||o.status==='dispute-resolved').length};
  });
  list=list.filter(u=>S.userFilter==='all'||u.kyc===S.userFilter);
  if(S.search)list=list.filter(u=>(u.name+u.email).toLowerCase().includes(S.search));
  if(!list.length){rows.innerHTML=`<tr><td colspan="6"><div class="empty">${accs.length?'No users match.':'No registered users yet.'}</div></td></tr>`;return;}
  const kmap={verified:['green','Verified'],pending:['gold','Pending review'],unverified:['grey','Unverified'],banned:['coral','Banned']};
  rows.innerHTML=list.map(u=>`<tr>
    <td class="cell-u"><span class="uav" style="background:${colorFor(u.name)}">${initials(u.name)}</span>
      <div><div class="nm">${u.name}</div></div></td>
    <td style="font-size:13px;color:var(--muted)">${u.email}</td>
    <td class="mono-c" style="color:var(--muted)">${u.joined}</td>
    <td class="mono-c">
      <div style="font-size:13px;color:var(--paper)">${u.total||'—'}</div>
      ${u.total>0?`<div style="font-size:11px;color:var(--faint)">${u.done} done</div>`:''}
    </td>
    <td><span class="pill ${kmap[u.kyc][0]}"><span class="d"></span>${kmap[u.kyc][1]}</span></td>
    <td class="row-act">
      ${u.kyc==='pending'?`<button class="tbtn g" data-app="${u.name}">Approve</button><button class="tbtn r" data-rej="${u.name}">Reject</button>`:
        u.kyc==='banned'?`<button class="tbtn b" data-unban="${u.name}">Unban</button>`:
        `<button class="tbtn r" data-ban="${u.name}">Ban</button>`}
    </td></tr>`).join('');
  rows.querySelectorAll('[data-app]').forEach(b=>b.addEventListener('click',()=>{setKyc(b.dataset.app,'verified');toast('KYC approved · '+b.dataset.app+' is now verified');}));
  rows.querySelectorAll('[data-rej]').forEach(b=>b.addEventListener('click',()=>{setKyc(b.dataset.rej,'unverified');toast('KYC rejected · '+b.dataset.rej,'warn');}));
  rows.querySelectorAll('[data-ban]').forEach(b=>b.addEventListener('click',()=>{setKyc(b.dataset.ban,'banned');toast(b.dataset.ban+' has been banned','bad');}));
  rows.querySelectorAll('[data-unban]').forEach(b=>b.addEventListener('click',()=>{setKyc(b.dataset.unban,'unverified');toast(b.dataset.unban+' unbanned','warn');}));
}
function setKyc(name,status){
  const accs=getAccounts();
  const idx=accs.findIndex(a=>a.username===name);
  if(idx>=0){accs[idx].kyc=status;saveAccounts(accs);}
  if(sb)sb.from('profiles').update({kyc:status}).eq('username',name);
  refreshBadges();renderUsers($('#content'));
}

/* ===== RATES ===== */
function renderRates(c){
  const cfg=JSON.parse(localStorage.getItem('vouch_config')||'{}');
  const rates=cfg.rates||{BTC:67500,ETH:2420,USDT:1,EUR:1.08,XAU:2350};
  const coins=[
    {sym:'BTC',name:'Bitcoin',color:'#E2B45A',icon:'₿'},
    {sym:'ETH',name:'Ethereum',color:'#5AA9E2',icon:'Ξ'},
    {sym:'USDT',name:'Tether',color:'#3FD98C',icon:'₮'},
    {sym:'EUR',name:'Euro',color:'#7B9FE8',icon:'€'},
    {sym:'XAU',name:'Gold',color:'#D4AF37',icon:'Au'},
  ];
  c.innerHTML=`
  <div style="max-width:680px">
    <p style="color:var(--muted);font-size:13.5px;margin-bottom:22px">Set the USD rate for each asset. These rates are shown on the exchange page and used to calculate trade values.</p>
    ${coins.map(coin=>`
    <div class="card" style="margin-bottom:14px">
      <div class="card-h" style="padding-bottom:14px">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:22px;color:${coin.color};font-family:var(--mono)">${coin.icon}</span>
          <div>
            <div style="font-weight:600;font-size:15px">${coin.name} <span style="color:var(--muted);font-size:12px">${coin.sym}</span></div>
            <div style="font-size:12px;color:var(--faint)">Current: <span style="color:${coin.color}" id="curRate${coin.sym}">${fmt$(rates[coin.sym])}</span> per ${coin.sym}</div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <input class="set-input-wide" id="rateInp${coin.sym}" type="number" min="0" step="0.01" placeholder="Enter USD rate" value="${rates[coin.sym]}" style="flex:1">
        <button class="tbtn g" data-saverate="${coin.sym}" style="padding:9px 16px">Save rate</button>
      </div>
    </div>`).join('')}
  </div>`;
  coins.forEach(coin=>{
    c.querySelector(`[data-saverate="${coin.sym}"]`).addEventListener('click',()=>{
      const inp=document.getElementById('rateInp'+coin.sym);
      const val=parseFloat(inp.value);
      if(!val||val<=0){toast('Enter a valid rate','bad');return;}
      const conf=JSON.parse(localStorage.getItem('vouch_config')||'{}');
      if(!conf.rates)conf.rates={};
      conf.rates[coin.sym]=val;
      localStorage.setItem('vouch_config',JSON.stringify(conf));
      document.getElementById('curRate'+coin.sym).textContent=fmt$(val);
      toast(`${coin.sym} rate updated to ${fmt$(val)}`);
    });
  });
}

/* ===== CHAT VIEW ===== */
function renderChatView(c){
  const allMsgs=getMsgs();
  const accs=getAccounts();
  /* default to first account */
  if(!S.chatUser&&accs.length)S.chatUser=accs[0].username;
  /* mark current user's incoming messages as read */
  saveMsgs(allMsgs.map(m=>{if(m.from==='customer'&&m.username===S.chatUser)m.read=true;return m;}));
  refreshBadges();
  /* build sidebar: all registered users, with unread count + last message */
  const sideItems=accs.map(a=>{
    const uMsgs=allMsgs.filter(m=>(m.from==='customer'&&m.username===a.username)||(m.from==='admin'&&m.toUser===a.username));
    const last=uMsgs.filter(m=>m.from!=='system').slice(-1)[0]||null;
    const unread=allMsgs.filter(m=>m.from==='customer'&&m.username===a.username&&!m.read).length;
    return{username:a.username,last,unread};
  });
  /* thread messages for selected user */
  const thread=allMsgs.filter(m=>(m.from==='customer'&&m.username===S.chatUser)||(m.from==='admin'&&m.toUser===S.chatUser)||(m.from==='system'));
  const ini=n=>(n||'?')[0].toUpperCase();
  c.innerHTML=`<div class="chat-layout">
    <div class="chat-sidebar">
      <div class="chat-sb-head">Conversations</div>
      ${accs.length?sideItems.map(si=>`
        <div class="chat-conv${si.username===S.chatUser?' on':''}" data-cu="${si.username}" style="cursor:pointer">
          <div class="cav" style="background:${colorFor(si.username)}">${ini(si.username)}</div>
          <div style="min-width:0;flex:1">
            <div class="cnm">${si.username}</div>
            <div class="cprev">${si.last?si.last.text:'No messages yet'}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
            <span class="ctime">${si.last?si.last.time:''}</span>
            ${si.unread?`<span class="cunread">${si.unread}</span>`:''}
          </div>
        </div>`).join('')
      :'<div style="padding:18px;font-family:var(--mono);font-size:12px;color:var(--faint)">No users registered yet.</div>'}
    </div>
    <div class="chat-main">
      <div class="chat-main-head">
        <div class="cav" style="background:${S.chatUser?colorFor(S.chatUser):'var(--faint)'}">${S.chatUser?ini(S.chatUser):'?'}</div>
        <div class="info"><div class="nm">${S.chatUser||'Select a user'}</div><div class="st">Registered user</div></div>
      </div>
      <div class="chat-msgs" id="chatMsgs">
        ${S.chatUser?(thread.length?thread.map(m=>{
          if(m.from==='system')return`<div class="am sys-a">${m.text}</div>`;
          return`<div class="am ${m.from==='customer'?'cust':'adm'}">${m.text}<span class="at">${m.time}</span></div>`;
        }).join(''):'<div class="chat-empty"><svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>No messages from ${S.chatUser} yet.</div>')
        :'<div class="chat-empty">Select a user to view their conversation.</div>'}
      </div>
      <div class="chat-input-row">
        <input id="adminMsgIn" placeholder="Reply to ${S.chatUser||'user'}…" autocomplete="off" ${!S.chatUser?'disabled':''}>
        <button class="chat-send-btn" id="adminSendBtn" ${!S.chatUser?'disabled':''} style="${!S.chatUser?'opacity:.4':''}"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg></button>
      </div>
    </div>
  </div>`;
  const msgsEl=document.getElementById('chatMsgs');
  if(msgsEl)msgsEl.scrollTop=msgsEl.scrollHeight;
  /* sidebar click */
  c.querySelectorAll('[data-cu]').forEach(el=>el.addEventListener('click',()=>{S.chatUser=el.dataset.cu;renderChatView(c);}));
  function sendAdminMsg(){
    if(!S.chatUser)return;
    const inp=document.getElementById('adminMsgIn');if(!inp)return;
    const text=inp.value.trim();if(!text)return;
    inp.value='';
    const msgs2=getMsgs();
    const m={id:Date.now().toString(36),from:'admin',toUser:S.chatUser,text,time:tnow(),read:false,ts:Date.now()};
    msgs2.push(m);saveMsgs(msgs2);
    BC&&BC.postMessage({type:'message',m});
    renderChatView(c);
  }
  document.getElementById('adminSendBtn').addEventListener('click',sendAdminMsg);
  document.getElementById('adminMsgIn').addEventListener('keydown',e=>{if(e.key==='Enter')sendAdminMsg();});
}

      <div class="set-row"><div><div class="k">Sort code / routing</div><div class="d">Sort code or routing number</div></div>
        <input class="set-input-wide" id="bSort" placeholder="12-34-56" value="${bd.sort||''}"></div>
    </div>
    <div class="card" style="margin-bottom:14px"><div class="card-h"><h3>Fees</h3></div>
      <div class="set-row"><div><div class="k">Maker fee</div><div class="d">Charged to the trader posting an offer</div></div><input class="set-input" id="fMaker" value="0.20%"></div>
      <div class="set-row"><div><div class="k">Taker fee</div><div class="d">Charged to the trader accepting an offer</div></div><input class="set-input" id="fTaker" value="0.55%"></div>
      <div class="set-row"><div><div class="k">Buyer fee</div><div class="d">Fee charged to buyers on completion</div></div><input class="set-input" id="fBuyer" value="0.00%"></div>
    </div>
    <div class="card" style="margin-bottom:14px"><div class="card-h"><h3>Risk controls</h3></div>
      <div class="set-row"><div><div class="k">Require KYC before first trade</div><div class="d">Block unverified accounts from trading</div></div><button class="toggle-sw on" data-t></button></div>
      <div class="set-row"><div><div class="k">Auto-flag offers off-market</div><div class="d">Flag offers priced beyond ±5% of spot</div></div><button class="toggle-sw on" data-t></button></div>
      <div class="set-row"><div><div class="k">Auto-escalate stale disputes</div><div class="d">Route disputes idle &gt; 6h to a senior admin</div></div><button class="toggle-sw" data-t></button></div>
      <div class="set-row"><div><div class="k">Payment window</div><div class="d">Default time a buyer has to pay</div></div><input class="set-input" id="fWindow" value="15 min"></div>
    </div>
    <button class="tbtn g" id="saveBtn" style="padding:12px 24px;font-size:14px">Save changes</button>
  </div>`;
  c.querySelectorAll('[data-t]').forEach(b=>b.addEventListener('click',()=>b.classList.toggle('on')));
  $('#saveBtn').addEventListener('click',()=>{
    const cfg=JSON.parse(localStorage.getItem('vouch_config')||'{}');
    cfg.sellWallets={
      BTC:document.getElementById('wBTC').value.trim(),
      ETH:document.getElementById('wETH').value.trim(),
      USDT:document.getElementById('wUSDT').value.trim(),
    };
    cfg.buyDetails={
      bank:document.getElementById('bBank').value.trim(),
      name:document.getElementById('bAccName').value.trim(),
      account:document.getElementById('bAcc').value.trim(),
      sort:document.getElementById('bSort').value.trim(),
    };
    localStorage.setItem('vouch_config',JSON.stringify(cfg));
    toast('Settings saved · live on next trade');
  });
}

/* ===== LIVE FLICKER ===== */
function tick(){
  if(S.view==='overview')renderOverview($('#content'));
}

/* ===== CROSS-TAB SYNC ===== */
window.addEventListener('storage',e=>{
  if(e.key==='vouch_accounts'){
    refreshBadges();
    if(S.view==='users')renderUsers($('#content'));
    if(S.view==='overview')renderOverview($('#content'));
  }
  if(e.key==='vouch_orders'){
    refreshBadges();
    if(S.view==='trades')renderTrades($('#content'));
    if(S.view==='disputes')renderDisputes($('#content'));
    if(S.view==='overview')renderOverview($('#content'));
  }
  if(e.key==='vouch_msgs'){
    refreshBadges();
    if(S.view==='chat')renderChatView($('#content'));
  }
});

/* ===== INIT ===== */
refreshBadges(); render();
syncAccountsFromSupabase();
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
if(!reduce)setInterval(tick,3000);
addEventListener('resize',()=>{if(S.view==='overview')drawVolChart();});
</script>
</body>
</html>
